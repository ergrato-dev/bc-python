<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400">
  <!-- Background -->
  <rect width="700" height="400" fill="#1e1e1e"/>

  <!-- Title -->
  <text x="350" y="35" font-family="Arial, sans-serif" font-size="20" fill="#4fc3f7" text-anchor="middle" font-weight="bold">
    Clases Abstractas (ABC)
  </text>

  <!-- Abstract Class Box (dashed border) -->
  <g transform="translate(250, 60)">
    <rect x="0" y="0" width="200" height="120" rx="8" fill="#2d2d2d" stroke="#FFD43B" stroke-width="2" stroke-dasharray="8,4"/>

    <!-- Class name -->
    <rect x="0" y="0" width="200" height="30" rx="8" fill="#FFD43B"/>
    <rect x="0" y="20" width="200" height="10" fill="#FFD43B"/>
    <text x="100" y="20" font-family="monospace" font-size="12" fill="#1e1e1e" text-anchor="middle" font-weight="bold">
      «abstract»
    </text>
    <text x="100" y="50" font-family="monospace" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">
      Shape
    </text>

    <!-- Abstract methods -->
    <line x1="10" y1="60" x2="190" y2="60" stroke="#444" stroke-width="1"/>
    <text x="15" y="80" font-family="monospace" font-size="11" fill="#4fc3f7">
      @abstractmethod
    </text>
    <text x="15" y="95" font-family="monospace" font-size="11" fill="#888">
      def area() → float
    </text>
    <text x="15" y="110" font-family="monospace" font-size="11" fill="#888">
      def perimeter() → float
    </text>
  </g>

  <!-- Inheritance arrows -->
  <g stroke="#4fc3f7" stroke-width="2" fill="none">
    <!-- Left arrow -->
    <path d="M280 180 L280 220 L150 220 L150 260"/>
    <polygon points="150,260 145,250 155,250" fill="#4fc3f7"/>

    <!-- Right arrow -->
    <path d="M420 180 L420 220 L550 220 L550 260"/>
    <polygon points="550,260 545,250 555,250" fill="#4fc3f7"/>
  </g>

  <!-- Concrete Class 1: Circle -->
  <g transform="translate(50, 260)">
    <rect x="0" y="0" width="200" height="120" rx="8" fill="#2d2d2d" stroke="#306998" stroke-width="2"/>

    <!-- Class name -->
    <rect x="0" y="0" width="200" height="30" rx="8" fill="#306998"/>
    <rect x="0" y="20" width="200" height="10" fill="#306998"/>
    <text x="100" y="20" font-family="monospace" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">
      Circle
    </text>

    <!-- Attributes -->
    <line x1="10" y1="35" x2="190" y2="35" stroke="#444" stroke-width="1"/>
    <text x="15" y="52" font-family="monospace" font-size="11" fill="#98c379">
      radius: float
    </text>

    <!-- Methods -->
    <line x1="10" y1="62" x2="190" y2="62" stroke="#444" stroke-width="1"/>
    <text x="15" y="80" font-family="monospace" font-size="11" fill="#ffffff">
      def area() → float
    </text>
    <text x="15" y="95" font-family="monospace" font-size="11" fill="#888">
        return π × r²
    </text>
    <text x="15" y="110" font-family="monospace" font-size="11" fill="#ffffff">
      def perimeter() → float
    </text>
  </g>

  <!-- Concrete Class 2: Rectangle -->
  <g transform="translate(450, 260)">
    <rect x="0" y="0" width="200" height="120" rx="8" fill="#2d2d2d" stroke="#306998" stroke-width="2"/>

    <!-- Class name -->
    <rect x="0" y="0" width="200" height="30" rx="8" fill="#306998"/>
    <rect x="0" y="20" width="200" height="10" fill="#306998"/>
    <text x="100" y="20" font-family="monospace" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">
      Rectangle
    </text>

    <!-- Attributes -->
    <line x1="10" y1="35" x2="190" y2="35" stroke="#444" stroke-width="1"/>
    <text x="15" y="52" font-family="monospace" font-size="11" fill="#98c379">
      width, height: float
    </text>

    <!-- Methods -->
    <line x1="10" y1="62" x2="190" y2="62" stroke="#444" stroke-width="1"/>
    <text x="15" y="80" font-family="monospace" font-size="11" fill="#ffffff">
      def area() → float
    </text>
    <text x="15" y="95" font-family="monospace" font-size="11" fill="#888">
        return w × h
    </text>
    <text x="15" y="110" font-family="monospace" font-size="11" fill="#ffffff">
      def perimeter() → float
    </text>
  </g>

  <!-- Labels -->
  <g font-family="Arial, sans-serif" font-size="11" fill="#888">
    <text x="60" y="235">hereda de</text>
    <text x="560" y="235">hereda de</text>
  </g>

  <!-- Legend -->
  <g transform="translate(20, 60)">
    <rect x="0" y="0" width="140" height="70" rx="5" fill="#252525" stroke="#333" stroke-width="1"/>
    <text x="10" y="18" font-family="Arial, sans-serif" font-size="10" fill="#888">Leyenda:</text>

    <!-- Abstract -->
    <rect x="10" y="25" width="30" height="15" rx="2" fill="none" stroke="#FFD43B" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="45" y="37" font-family="Arial, sans-serif" font-size="10" fill="#FFD43B">Abstracta</text>

    <!-- Concrete -->
    <rect x="10" y="48" width="30" height="15" rx="2" fill="none" stroke="#306998" stroke-width="2"/>
    <text x="45" y="60" font-family="Arial, sans-serif" font-size="10" fill="#306998">Concreta</text>
  </g>

  <!-- Error note -->
  <g transform="translate(510, 60)">
    <rect x="0" y="0" width="170" height="55" rx="5" fill="#3d1f1f" stroke="#e06c75" stroke-width="1"/>
    <text x="10" y="18" font-family="Arial, sans-serif" font-size="10" fill="#e06c75">⚠ No instanciable:</text>
    <text x="10" y="35" font-family="monospace" font-size="10" fill="#888">shape = Shape()</text>
    <text x="10" y="48" font-family="monospace" font-size="9" fill="#e06c75"># TypeError!</text>
  </g>
</svg>

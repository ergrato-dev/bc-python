<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bgGrad)"/>

  <!-- Decorative Grid Pattern -->
  <g opacity="0.1">
    <line x1="0" y1="50" x2="800" y2="50" stroke="#4fc3f7" stroke-width="1"/>
    <line x1="0" y1="100" x2="800" y2="100" stroke="#4fc3f7" stroke-width="1"/>
    <line x1="0" y1="150" x2="800" y2="150" stroke="#4fc3f7" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="200" stroke="#4fc3f7" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="200" stroke="#4fc3f7" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="200" stroke="#4fc3f7" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="200" stroke="#4fc3f7" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="200" stroke="#4fc3f7" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="200" stroke="#4fc3f7" stroke-width="1"/>
  </g>

  <!-- Package/Module Icon -->
  <g transform="translate(80, 55)">
    <!-- Main package box -->
    <rect x="0" y="20" width="80" height="70" rx="5" fill="#306998" stroke="#4fc3f7" stroke-width="2"/>

    <!-- Package flap -->
    <path d="M0 30 L40 5 L80 30 L80 20 L40 -5 L0 20 Z" fill="#FFD43B" stroke="#4fc3f7" stroke-width="2"/>

    <!-- Inner modules -->
    <rect x="10" y="35" width="25" height="20" rx="2" fill="#4fc3f7" opacity="0.8"/>
    <rect x="45" y="35" width="25" height="20" rx="2" fill="#4fc3f7" opacity="0.8"/>
    <rect x="10" y="60" width="60" height="20" rx="2" fill="#4fc3f7" opacity="0.6"/>

    <!-- Module dots -->
    <circle cx="22" cy="45" r="3" fill="#1a1a2e"/>
    <circle cx="57" cy="45" r="3" fill="#1a1a2e"/>
  </g>

  <!-- Abstract Class Icon -->
  <g transform="translate(620, 55)">
    <!-- Abstract class box (dashed) -->
    <rect x="0" y="0" width="90" height="90" rx="5" fill="none" stroke="#FFD43B" stroke-width="2" stroke-dasharray="8,4"/>

    <!-- ABC label -->
    <text x="45" y="25" font-family="monospace" font-size="14" fill="#FFD43B" text-anchor="middle" font-weight="bold">ABC</text>

    <!-- Abstract methods -->
    <line x1="10" y1="35" x2="80" y2="35" stroke="#4fc3f7" stroke-width="1"/>
    <text x="15" y="52" font-family="monospace" font-size="10" fill="#4fc3f7">@abstract</text>
    <text x="15" y="67" font-family="monospace" font-size="10" fill="#4fc3f7">def method()</text>
    <text x="15" y="82" font-family="monospace" font-size="10" fill="#888">    ...</text>
  </g>

  <!-- Week Number -->
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="18" fill="#4fc3f7" text-anchor="middle" font-weight="bold">
    SEMANA 10
  </text>

  <!-- Main Title -->
  <text x="400" y="95" font-family="Arial, sans-serif" font-size="32" fill="#ffffff" text-anchor="middle" font-weight="bold">
    Clases Abstractas, Módulos
  </text>
  <text x="400" y="130" font-family="Arial, sans-serif" font-size="32" fill="#ffffff" text-anchor="middle" font-weight="bold">
    y Paquetes
  </text>

  <!-- Subtitle -->
  <text x="400" y="165" font-family="Arial, sans-serif" font-size="14" fill="#888888" text-anchor="middle">
    ABC • Protocols • Imports • pyproject.toml • uv
  </text>

  <!-- Connection lines -->
  <g stroke="#306998" stroke-width="2" opacity="0.5">
    <path d="M170 100 Q 250 100 280 100" fill="none"/>
    <path d="M520 100 Q 560 100 620 100" fill="none"/>
  </g>

  <!-- Python logo small -->
  <g transform="translate(375, 175)">
    <circle cx="0" cy="0" r="4" fill="#306998"/>
    <circle cx="12" cy="0" r="4" fill="#FFD43B"/>
    <circle cx="24" cy="0" r="4" fill="#306998"/>
    <circle cx="36" cy="0" r="4" fill="#FFD43B"/>
    <circle cx="48" cy="0" r="4" fill="#306998"/>
  </g>

  <!-- Progress indicator -->
  <g transform="translate(50, 185)">
    <rect x="0" y="0" width="700" height="4" rx="2" fill="#333"/>
    <rect x="0" y="0" width="500" height="4" rx="2" fill="#4fc3f7"/>
    <text x="710" y="4" font-family="Arial, sans-serif" font-size="10" fill="#888">10/14</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <!-- Background -->
  <rect width="800" height="200" fill="#1a1a2e"/>

  <!-- Decorative elements -->
  <circle cx="50" cy="100" r="80" fill="#306998" opacity="0.1"/>
  <circle cx="750" cy="100" r="80" fill="#FFD43B" opacity="0.1"/>

  <!-- Test icons -->
  <g transform="translate(80, 70)">
    <!-- Checkmark in circle -->
    <circle cx="0" cy="30" r="25" fill="none" stroke="#4CAF50" stroke-width="3"/>
    <path d="M-10 30 L-3 38 L12 22" fill="none" stroke="#4CAF50" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(160, 70)">
    <!-- X in circle -->
    <circle cx="0" cy="30" r="25" fill="none" stroke="#f44336" stroke-width="3"/>
    <path d="M-10 20 L10 40 M10 20 L-10 40" fill="none" stroke="#f44336" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Main title -->
  <text x="400" y="85" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#ffffff" text-anchor="middle">Semana 13</text>

  <!-- Subtitle -->
  <text x="400" y="125" font-family="Arial, sans-serif" font-size="22" fill="#4fc3f7" text-anchor="middle">Testing con pytest, Debugging y Logging</text>

  <!-- Decorative code elements -->
  <g transform="translate(580, 60)">
    <text font-family="monospace" font-size="14" fill="#4CAF50">def test_</text>
    <text x="70" font-family="monospace" font-size="14" fill="#82aaff">function</text>
    <text x="132" font-family="monospace" font-size="14" fill="#a0a0a0">():</text>
  </g>

  <g transform="translate(590, 82)">
    <text font-family="monospace" font-size="14" fill="#c792ea">assert</text>
    <text x="52" font-family="monospace" font-size="14" fill="#a0a0a0"> result == expected</text>
  </g>

  <!-- pytest logo representation -->
  <g transform="translate(680, 100)">
    <rect x="0" y="0" width="60" height="30" rx="4" fill="#306998"/>
    <text x="30" y="21" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFD43B" text-anchor="middle">pytest</text>
  </g>

  <!-- Bottom decorative line -->
  <rect x="100" y="160" width="600" height="3" rx="1.5" fill="url(#gradient1)"/>

  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#4fc3f7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f44336;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Week number badge -->
  <g transform="translate(50, 20)">
    <rect x="0" y="0" width="50" height="25" rx="12" fill="#4fc3f7"/>
    <text x="25" y="17" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e" text-anchor="middle">W13</text>
  </g>
</svg>

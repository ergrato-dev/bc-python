<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <!-- Background -->
  <rect width="800" height="450" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="26" font-weight="bold">Niveles de Logging en Python</text>
  <text x="400" y="65" text-anchor="middle" fill="#aaaaaa" font-family="Inter, sans-serif" font-size="14">De menor a mayor severidad</text>

  <!-- Severity arrow -->
  <line x1="100" y1="100" x2="100" y2="400" stroke="#777777" stroke-width="2"/>
  <polygon points="100,400 95,385 105,385" fill="#777777"/>
  <text x="60" y="250" fill="#bbbbbb" font-family="Inter, sans-serif" font-size="12" font-weight="bold" transform="rotate(-90,60,250)">Severidad →</text>

  <!-- Level 1: DEBUG -->
  <rect x="130" y="95" width="640" height="55" rx="8" fill="#306998" stroke="#4a90d9" stroke-width="2"/>
  <text x="160" y="115" fill="#ffffff" font-family="Inter, sans-serif" font-size="11">Valor: 10</text>
  <text x="200" y="130" fill="#ffffff" font-family="Inter, sans-serif" font-size="18" font-weight="bold">DEBUG</text>
  <text x="310" y="125" fill="#c0e8ff" font-family="Inter, sans-serif" font-size="12">Información detallada para diagnóstico</text>
  <text x="310" y="143" fill="#a0d0f0" font-family="Inter, sans-serif" font-size="11">Variables, estados internos, flujo del programa</text>
  <rect x="610" y="105" width="150" height="35" rx="4" fill="#1a3a5a"/>
  <text x="685" y="128" text-anchor="middle" fill="#a0d0ff" font-family="monospace" font-size="10">logger.debug()</text>

  <!-- Level 2: INFO -->
  <rect x="130" y="160" width="640" height="55" rx="8" fill="#27ae60" stroke="#2ecc71" stroke-width="2"/>
  <text x="160" y="180" fill="#ffffff" font-family="Inter, sans-serif" font-size="11">Valor: 20</text>
  <text x="200" y="195" fill="#ffffff" font-family="Inter, sans-serif" font-size="18" font-weight="bold">INFO</text>
  <text x="310" y="190" fill="#c0ffc0" font-family="Inter, sans-serif" font-size="12">Confirmación de que todo funciona correctamente</text>
  <text x="310" y="208" fill="#a0e8a0" font-family="Inter, sans-serif" font-size="11">Inicio de servicios, operaciones completadas</text>
  <rect x="610" y="170" width="150" height="35" rx="4" fill="#1a3a2a"/>
  <text x="685" y="193" text-anchor="middle" fill="#a0ffa0" font-family="monospace" font-size="10">logger.info()</text>

  <!-- Level 3: WARNING -->
  <rect x="130" y="225" width="640" height="55" rx="8" fill="#FFD43B" stroke="#ffd700" stroke-width="2"/>
  <text x="160" y="245" fill="#1a1a2e" font-family="Inter, sans-serif" font-size="11">Valor: 30</text>
  <text x="200" y="260" fill="#1a1a2e" font-family="Inter, sans-serif" font-size="18" font-weight="bold">WARNING</text>
  <text x="310" y="255" fill="#1a1a1a" font-family="Inter, sans-serif" font-size="12">Algo inesperado, pero el programa continúa</text>
  <text x="310" y="273" fill="#2a2a2a" font-family="Inter, sans-serif" font-size="11">Deprecaciones, recursos bajos, configuración subóptima</text>
  <rect x="610" y="235" width="150" height="35" rx="4" fill="#3a3a1a"/>
  <text x="685" y="258" text-anchor="middle" fill="#FFD43B" font-family="monospace" font-size="10">logger.warning()</text>

  <!-- Level 4: ERROR -->
  <rect x="130" y="290" width="640" height="55" rx="8" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="160" y="310" fill="#ffffff" font-family="Inter, sans-serif" font-size="11">Valor: 40</text>
  <text x="200" y="325" fill="#ffffff" font-family="Inter, sans-serif" font-size="18" font-weight="bold">ERROR</text>
  <text x="310" y="320" fill="#ffe0e0" font-family="Inter, sans-serif" font-size="12">Problema serio, alguna funcionalidad falló</text>
  <text x="310" y="338" fill="#ffbbbb" font-family="Inter, sans-serif" font-size="11">Excepciones capturadas, operaciones fallidas</text>
  <rect x="610" y="300" width="150" height="35" rx="4" fill="#3a1a1a"/>
  <text x="685" y="323" text-anchor="middle" fill="#ffcccc" font-family="monospace" font-size="10">logger.error()</text>

  <!-- Level 5: CRITICAL -->
  <rect x="130" y="355" width="640" height="55" rx="8" fill="#8e44ad" stroke="#9b59b6" stroke-width="2"/>
  <text x="160" y="375" fill="#ffffff" font-family="Inter, sans-serif" font-size="11">Valor: 50</text>
  <text x="200" y="390" fill="#ffffff" font-family="Inter, sans-serif" font-size="18" font-weight="bold">CRITICAL</text>
  <text x="310" y="385" fill="#e0c0ff" font-family="Inter, sans-serif" font-size="12">Error grave, el programa puede terminar</text>
  <text x="310" y="403" fill="#d0b0f0" font-family="Inter, sans-serif" font-size="11">Fallo de sistema, pérdida de datos, crash inminente</text>
  <rect x="610" y="365" width="150" height="35" rx="4" fill="#2a1a3a"/>
  <text x="685" y="388" text-anchor="middle" fill="#d0a0ff" font-family="monospace" font-size="10">logger.critical()</text>

  <!-- Filter indicator -->
  <rect x="130" y="420" width="640" height="25" rx="5" fill="none" stroke="#666666" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="450" y="437" text-anchor="middle" fill="#aaaaaa" font-family="Inter, sans-serif" font-size="11">logging.setLevel(logging.WARNING) → Solo muestra WARNING, ERROR y CRITICAL</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="unitGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#306998"/>
      <stop offset="100%" style="stop-color:#1a4971"/>
    </linearGradient>
    <linearGradient id="intGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD43B"/>
      <stop offset="100%" style="stop-color:#d4a800"/>
    </linearGradient>
    <linearGradient id="e2eGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="28" font-weight="bold">Pirámide de Testing</text>

  <!-- Pyramid Base - Unit Tests -->
  <polygon points="400,420 100,420 175,320 625,320 700,420" fill="url(#unitGrad)" stroke="#4a90d9" stroke-width="2"/>
  <text x="400" y="380" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="22" font-weight="bold">Unit Tests</text>
  <text x="400" y="405" text-anchor="middle" fill="#a0d0ff" font-family="Inter, sans-serif" font-size="14">70-80% de los tests</text>

  <!-- Pyramid Middle - Integration Tests -->
  <polygon points="400,320 175,320 265,200 535,200 625,320" fill="url(#intGrad)" stroke="#ffd700" stroke-width="2"/>
  <text x="400" y="265" text-anchor="middle" fill="#1a1a2e" font-family="Inter, sans-serif" font-size="20" font-weight="bold">Integration Tests</text>
  <text x="400" y="290" text-anchor="middle" fill="#333333" font-family="Inter, sans-serif" font-size="13">15-20% de los tests</text>

  <!-- Pyramid Top - E2E Tests -->
  <polygon points="400,200 265,200 340,100 460,100 535,200" fill="url(#e2eGrad)" stroke="#ff6b6b" stroke-width="2"/>
  <text x="400" y="155" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="18" font-weight="bold">E2E Tests</text>
  <text x="400" y="175" text-anchor="middle" fill="#ffcccc" font-family="Inter, sans-serif" font-size="12">5-10% de los tests</text>

  <!-- Left annotations -->
  <line x1="80" y1="370" x2="95" y2="370" stroke="#4a90d9" stroke-width="2"/>
  <text x="75" y="360" text-anchor="end" fill="#4a90d9" font-family="Inter, sans-serif" font-size="12">Rápidos</text>
  <text x="75" y="380" text-anchor="end" fill="#4a90d9" font-family="Inter, sans-serif" font-size="12">Aislados</text>
  <text x="75" y="400" text-anchor="end" fill="#4a90d9" font-family="Inter, sans-serif" font-size="12">Muchos</text>

  <line x1="155" y1="260" x2="170" y2="260" stroke="#FFD43B" stroke-width="2"/>
  <text x="150" y="255" text-anchor="end" fill="#FFD43B" font-family="Inter, sans-serif" font-size="12">Moderados</text>
  <text x="150" y="275" text-anchor="end" fill="#FFD43B" font-family="Inter, sans-serif" font-size="12">Integrados</text>

  <line x1="250" y1="150" x2="260" y2="150" stroke="#e74c3c" stroke-width="2"/>
  <text x="245" y="145" text-anchor="end" fill="#e74c3c" font-family="Inter, sans-serif" font-size="12">Lentos</text>
  <text x="245" y="165" text-anchor="end" fill="#e74c3c" font-family="Inter, sans-serif" font-size="12">Completos</text>

  <!-- Right annotations - characteristics -->
  <rect x="720" y="90" width="70" height="25" rx="5" fill="#e74c3c" opacity="0.3"/>
  <text x="755" y="108" text-anchor="middle" fill="#e74c3c" font-family="Inter, sans-serif" font-size="11">UI/Browser</text>

  <rect x="720" y="190" width="70" height="25" rx="5" fill="#FFD43B" opacity="0.3"/>
  <text x="755" y="208" text-anchor="middle" fill="#FFD43B" font-family="Inter, sans-serif" font-size="11">API/DB</text>

  <rect x="720" y="340" width="70" height="25" rx="5" fill="#306998" opacity="0.3"/>
  <text x="755" y="358" text-anchor="middle" fill="#4a90d9" font-family="Inter, sans-serif" font-size="11">Funciones</text>

  <!-- Speed/Cost indicators -->
  <text x="25" y="150" fill="#888888" font-family="Inter, sans-serif" font-size="11" transform="rotate(-90,25,150)">← Más Lento / Costoso</text>
  <text x="25" y="370" fill="#888888" font-family="Inter, sans-serif" font-size="11" transform="rotate(-90,25,370)">Más Rápido / Barato →</text>

  <!-- Arrow indicators on right -->
  <line x1="780" y1="120" x2="780" y2="360" stroke="#555555" stroke-width="1" stroke-dasharray="5,5"/>
  <polygon points="780,120 775,135 785,135" fill="#555555"/>
  <text x="790" y="240" fill="#666666" font-family="Inter, sans-serif" font-size="10" transform="rotate(90,790,240)">Cantidad de tests</text>

  <!-- Footer -->
  <text x="400" y="470" text-anchor="middle" fill="#666666" font-family="Inter, sans-serif" font-size="12">La base de la pirámide debe ser sólida: muchos unit tests rápidos y confiables</text>
</svg>

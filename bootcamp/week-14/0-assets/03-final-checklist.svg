<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="bold">✅ Checklist Final - Proyecto Weather Dashboard</text>

  <!-- Section 1: Functionality -->
  <rect x="30" y="60" width="360" height="200" rx="8" fill="#2d3a4f" stroke="#50fa7b" stroke-width="2" filter="url(#shadow)"/>
  <text x="50" y="90" fill="#50fa7b" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold">📋 Funcionalidad (30 pts)</text>

  <rect x="45" y="105" width="20" height="20" rx="4" fill="#363f52" stroke="#50fa7b" stroke-width="1"/>
  <text x="75" y="120" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="12">Clima actual funciona (8 pts)</text>

  <rect x="45" y="135" width="20" height="20" rx="4" fill="#363f52" stroke="#50fa7b" stroke-width="1"/>
  <text x="75" y="150" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="12">Pronóstico 5 días funciona (8 pts)</text>

  <rect x="45" y="165" width="20" height="20" rx="4" fill="#363f52" stroke="#50fa7b" stroke-width="1"/>
  <text x="75" y="180" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="12">CRUD favoritos completo (7 pts)</text>

  <rect x="45" y="195" width="20" height="20" rx="4" fill="#363f52" stroke="#50fa7b" stroke-width="1"/>
  <text x="75" y="210" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="12">Historial con persistencia (7 pts)</text>

  <rect x="45" y="225" width="20" height="20" rx="4" fill="#363f52" stroke="#50fa7b" stroke-width="1"/>
  <text x="75" y="240" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="12">Manejo de errores robusto</text>

  <!-- Section 2: Code Quality -->
  <rect x="410" y="60" width="360" height="200" rx="8" fill="#2d3a4f" stroke="#ff79c6" stroke-width="2" filter="url(#shadow)"/>
  <text x="430" y="90" fill="#ff79c6" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold">💻 Calidad del Código (25 pts)</text>

  <rect x="425" y="105" width="20" height="20" rx="4" fill="#363f52" stroke="#ff79c6" stroke-width="1"/>
  <text x="455" y="120" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="12">Type hints completos (7 pts)</text>

  <rect x="425" y="135" width="20" height="20" rx="4" fill="#363f52" stroke="#ff79c6" stroke-width="1"/>
  <text x="455" y="150" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="12">Arquitectura en capas (8 pts)</text>

  <rect x="425" y="165" width="20" height="20" rx="4" fill="#363f52" stroke="#ff79c6" stroke-width="1"/>
  <text x="455" y="180" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="12">Código limpio DRY, SRP (5 pts)</text>

  <rect x="425" y="195" width="20" height="20" rx="4" fill="#363f52" stroke="#ff79c6" stroke-width="1"/>
  <text x="455" y="210" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="12">Excepciones personalizadas (5 pts)</text>

  <rect x="425" y="225" width="20" height="20" rx="4" fill="#363f52" stroke="#ff79c6" stroke-width="1"/>
  <text x="455" y="240" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="12">Sin código duplicado</text>

  <!-- Section 3: Testing -->
  <rect x="30" y="275" width="360" height="170" rx="8" fill="#2d3a4f" stroke="#8be9fd" stroke-width="2" filter="url(#shadow)"/>
  <text x="50" y="305" fill="#8be9fd" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold">🧪 Testing (20 pts)</text>

  <rect x="45" y="320" width="20" height="20" rx="4" fill="#363f52" stroke="#8be9fd" stroke-width="1"/>
  <text x="75" y="335" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="12">Cobertura &gt;85% (8 pts)</text>

  <rect x="45" y="350" width="20" height="20" rx="4" fill="#363f52" stroke="#8be9fd" stroke-width="1"/>
  <text x="75" y="365" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="12">Tests unitarios con mocks (7 pts)</text>

  <rect x="45" y="380" width="20" height="20" rx="4" fill="#363f52" stroke="#8be9fd" stroke-width="1"/>
  <text x="75" y="395" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="12">Patrón AAA, edge cases (5 pts)</text>

  <rect x="45" y="410" width="20" height="20" rx="4" fill="#363f52" stroke="#8be9fd" stroke-width="1"/>
  <text x="75" y="425" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="12">Fixtures reutilizables</text>

  <!-- Section 4: Documentation -->
  <rect x="410" y="275" width="360" height="170" rx="8" fill="#2d3a4f" stroke="#ffb86c" stroke-width="2" filter="url(#shadow)"/>
  <text x="430" y="305" fill="#ffb86c" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold">📖 Documentación (15 pts)</text>

  <rect x="425" y="320" width="20" height="20" rx="4" fill="#363f52" stroke="#ffb86c" stroke-width="1"/>
  <text x="455" y="335" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="12">README completo (5 pts)</text>

  <rect x="425" y="350" width="20" height="20" rx="4" fill="#363f52" stroke="#ffb86c" stroke-width="1"/>
  <text x="455" y="365" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="12">Docstrings en funciones (5 pts)</text>

  <rect x="425" y="380" width="20" height="20" rx="4" fill="#363f52" stroke="#ffb86c" stroke-width="1"/>
  <text x="455" y="395" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="12">Comentarios útiles (3 pts)</text>

  <rect x="425" y="410" width="20" height="20" rx="4" fill="#363f52" stroke="#ffb86c" stroke-width="1"/>
  <text x="455" y="425" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="12">.env.example documentado (2 pts)</text>

  <!-- Bottom: Summary and Commands -->
  <rect x="30" y="460" width="360" height="45" rx="8" fill="#363f52" stroke="#f1fa8c" stroke-width="2"/>
  <text x="50" y="485" fill="#f1fa8c" font-family="monospace" font-size="11">$ uv run pytest --cov=src --cov-report=term-missing</text>
  <text x="50" y="498" fill="#6272a4" font-family="Inter, system-ui, sans-serif" font-size="10">Verificar cobertura de tests</text>

  <rect x="410" y="460" width="360" height="45" rx="8" fill="#363f52" stroke="#bd93f9" stroke-width="2"/>
  <text x="430" y="480" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold">🎯 Total: 100 pts</text>
  <text x="430" y="498" fill="#50fa7b" font-family="Inter, system-ui, sans-serif" font-size="12">Mínimo para aprobar: 70 pts (70%)</text>
</svg>

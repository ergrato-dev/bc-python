<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      .bg { fill: #1e1e1e; }
      .box { fill: #2d2d2d; stroke: #306998; stroke-width: 2; rx: 8; }
      .box-value { fill: #1a2e1a; stroke: #4ade80; stroke-width: 2; rx: 6; }
      .box-var { fill: #2d1a1a; stroke: #FFD43B; stroke-width: 2; rx: 6; }
      .arrow { stroke: #306998; stroke-width: 2; fill: none; marker-end: url(#arrowhead2); }
      .text-title { fill: #ffffff; font-family: Inter, system-ui, sans-serif; font-size: 18px; font-weight: 600; }
      .text-main { fill: #e0e0e0; font-family: Inter, system-ui, sans-serif; font-size: 14px; }
      .text-code { fill: #FFD43B; font-family: monospace; font-size: 14px; }
      .text-value { fill: #4ade80; font-family: monospace; font-size: 14px; }
      .text-small { fill: #888888; font-family: Inter, system-ui, sans-serif; font-size: 12px; }
      .text-type { fill: #60a5fa; font-family: monospace; font-size: 11px; }
    </style>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#306998"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect class="bg" width="800" height="400"/>

  <!-- Title -->
  <text class="text-title" x="400" y="35" text-anchor="middle">Variables: Referencias a Objetos en Memoria</text>

  <!-- Code Section -->
  <rect class="box" x="40" y="60" width="220" height="150"/>
  <text class="text-main" x="150" y="90" text-anchor="middle" font-weight="600">📝 Código Python</text>
  <text class="text-code" x="60" y="125">nombre: str = "Ana"</text>
  <text class="text-code" x="60" y="155">edad: int = 25</text>
  <text class="text-code" x="60" y="185">altura: float = 1.65</text>

  <!-- Variables Section -->
  <rect class="box" x="290" y="60" width="160" height="150"/>
  <text class="text-main" x="370" y="90" text-anchor="middle" font-weight="600">🏷️ Variables</text>
  <text class="text-small" x="370" y="110" text-anchor="middle">(nombres/etiquetas)</text>

  <rect class="box-var" x="310" y="125" width="120" height="28"/>
  <text class="text-code" x="370" y="145" text-anchor="middle">nombre</text>

  <rect class="box-var" x="310" y="158" width="120" height="28"/>
  <text class="text-code" x="370" y="178" text-anchor="middle">edad</text>

  <!-- Memory Section -->
  <rect class="box" x="500" y="60" width="260" height="150"/>
  <text class="text-main" x="630" y="90" text-anchor="middle" font-weight="600">💾 Memoria (Objetos)</text>

  <rect class="box-value" x="520" y="115" width="100" height="40"/>
  <text class="text-value" x="570" y="140" text-anchor="middle">"Ana"</text>
  <text class="text-type" x="635" y="140">str</text>

  <rect class="box-value" x="520" y="160" width="100" height="40"/>
  <text class="text-value" x="570" y="185" text-anchor="middle">25</text>
  <text class="text-type" x="635" y="185">int</text>

  <!-- Arrows -->
  <path class="arrow" d="M 430 139 L 515 135"/>
  <path class="arrow" d="M 430 172 L 515 180"/>

  <!-- Type Hints Section -->
  <rect class="box" x="40" y="240" width="720" height="140"/>
  <text class="text-main" x="400" y="270" text-anchor="middle" font-weight="600">🎯 Type Hints: Indicamos el Tipo Esperado</text>

  <!-- Without Type Hints -->
  <rect fill="#1e1e1e" x="60" y="290" width="200" height="70" rx="4"/>
  <text class="text-small" x="160" y="310" text-anchor="middle">❌ Sin type hints</text>
  <text class="text-code" x="70" y="340">nombre = "Ana"</text>

  <!-- With Type Hints -->
  <rect fill="#1e1e1e" x="300" y="290" width="240" height="70" rx="4"/>
  <text class="text-small" x="420" y="310" text-anchor="middle" fill="#4ade80">✅ Con type hints</text>
  <text class="text-code" x="310" y="340">nombre: str = "Ana"</text>

  <!-- Benefits -->
  <text class="text-small" x="580" y="310">Beneficios:</text>
  <text class="text-small" x="580" y="330">• Código más legible</text>
  <text class="text-small" x="580" y="350">• Detecta errores antes</text>
  <text class="text-small" x="580" y="370">• Mejor autocompletado</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <!-- Background -->
  <rect width="800" height="520" fill="#1e1e1e"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#FFD43B" font-family="Inter, sans-serif" font-size="22" font-weight="bold">Métodos Especiales (Dunder Methods)</text>
  <text x="400" y="55" text-anchor="middle" fill="#b0b0b0" font-family="Inter, sans-serif" font-size="12">__nombre__ → Double UNDERscore</text>

  <!-- Category 1: Representación -->
  <g transform="translate(30, 80)">
    <rect width="230" height="180" rx="10" fill="#1e3a5f" stroke="#4a90d9" stroke-width="2"/>
    <text x="115" y="25" text-anchor="middle" fill="#6ab0ff" font-family="Inter, sans-serif" font-size="14" font-weight="bold">📝 Representación</text>

    <g transform="translate(15, 45)">
      <rect width="200" height="35" rx="5" fill="#2d4a6f"/>
      <text x="10" y="15" fill="#f0e68c" font-family="monospace" font-size="11">__str__</text>
      <text x="10" y="28" fill="#b0b0b0" font-family="Inter, sans-serif" font-size="9">str(obj) / print(obj)</text>
    </g>

    <g transform="translate(15, 90)">
      <rect width="200" height="35" rx="5" fill="#2d4a6f"/>
      <text x="10" y="15" fill="#f0e68c" font-family="monospace" font-size="11">__repr__</text>
      <text x="10" y="28" fill="#b0b0b0" font-family="Inter, sans-serif" font-size="9">repr(obj) / debugging</text>
    </g>

    <g transform="translate(15, 135)">
      <rect width="200" height="35" rx="5" fill="#2d4a6f"/>
      <text x="10" y="15" fill="#f0e68c" font-family="monospace" font-size="11">__format__</text>
      <text x="10" y="28" fill="#b0b0b0" font-family="Inter, sans-serif" font-size="9">f"{obj:spec}"</text>
    </g>
  </g>

  <!-- Category 2: Comparación -->
  <g transform="translate(285, 80)">
    <rect width="230" height="180" rx="10" fill="#3d2d1e" stroke="#d99a4a" stroke-width="2"/>
    <text x="115" y="25" text-anchor="middle" fill="#f0ba6a" font-family="Inter, sans-serif" font-size="14" font-weight="bold">⚖️ Comparación</text>

    <g transform="translate(15, 45)">
      <rect width="95" height="35" rx="5" fill="#5a4a3d"/>
      <text x="10" y="15" fill="#f0e68c" font-family="monospace" font-size="11">__eq__</text>
      <text x="10" y="28" fill="#b0b0b0" font-family="Inter, sans-serif" font-size="9">a == b</text>
    </g>

    <g transform="translate(120, 45)">
      <rect width="95" height="35" rx="5" fill="#5a4a3d"/>
      <text x="10" y="15" fill="#f0e68c" font-family="monospace" font-size="11">__ne__</text>
      <text x="10" y="28" fill="#b0b0b0" font-family="Inter, sans-serif" font-size="9">a != b</text>
    </g>

    <g transform="translate(15, 90)">
      <rect width="95" height="35" rx="5" fill="#5a4a3d"/>
      <text x="10" y="15" fill="#f0e68c" font-family="monospace" font-size="11">__lt__</text>
      <text x="10" y="28" fill="#b0b0b0" font-family="Inter, sans-serif" font-size="9">a &lt; b</text>
    </g>

    <g transform="translate(120, 90)">
      <rect width="95" height="35" rx="5" fill="#5a4a3d"/>
      <text x="10" y="15" fill="#f0e68c" font-family="monospace" font-size="11">__gt__</text>
      <text x="10" y="28" fill="#b0b0b0" font-family="Inter, sans-serif" font-size="9">a &gt; b</text>
    </g>

    <g transform="translate(15, 135)">
      <rect width="95" height="35" rx="5" fill="#5a4a3d"/>
      <text x="10" y="15" fill="#f0e68c" font-family="monospace" font-size="11">__le__</text>
      <text x="10" y="28" fill="#b0b0b0" font-family="Inter, sans-serif" font-size="9">a &lt;= b</text>
    </g>

    <g transform="translate(120, 135)">
      <rect width="95" height="35" rx="5" fill="#5a4a3d"/>
      <text x="10" y="15" fill="#f0e68c" font-family="monospace" font-size="11">__ge__</text>
      <text x="10" y="28" fill="#b0b0b0" font-family="Inter, sans-serif" font-size="9">a &gt;= b</text>
    </g>
  </g>

  <!-- Category 3: Contenedores -->
  <g transform="translate(540, 80)">
    <rect width="230" height="180" rx="10" fill="#2d3d2d" stroke="#4a9d4a" stroke-width="2"/>
    <text x="115" y="25" text-anchor="middle" fill="#6abd6a" font-family="Inter, sans-serif" font-size="14" font-weight="bold">📦 Contenedores</text>

    <g transform="translate(15, 45)">
      <rect width="200" height="35" rx="5" fill="#3d5a3d"/>
      <text x="10" y="15" fill="#f0e68c" font-family="monospace" font-size="11">__len__</text>
      <text x="10" y="28" fill="#b0b0b0" font-family="Inter, sans-serif" font-size="9">len(obj)</text>
    </g>

    <g transform="translate(15, 90)">
      <rect width="200" height="35" rx="5" fill="#3d5a3d"/>
      <text x="10" y="15" fill="#f0e68c" font-family="monospace" font-size="11">__getitem__</text>
      <text x="10" y="28" fill="#b0b0b0" font-family="Inter, sans-serif" font-size="9">obj[key]</text>
    </g>

    <g transform="translate(15, 135)">
      <rect width="200" height="35" rx="5" fill="#3d5a3d"/>
      <text x="10" y="15" fill="#f0e68c" font-family="monospace" font-size="11">__contains__</text>
      <text x="10" y="28" fill="#b0b0b0" font-family="Inter, sans-serif" font-size="9">x in obj</text>
    </g>
  </g>

  <!-- Category 4: Operadores Aritméticos -->
  <g transform="translate(30, 280)">
    <rect width="230" height="180" rx="10" fill="#3d2d3d" stroke="#9d4a9d" stroke-width="2"/>
    <text x="115" y="25" text-anchor="middle" fill="#bd6abd" font-family="Inter, sans-serif" font-size="14" font-weight="bold">➕ Aritméticos</text>

    <g transform="translate(15, 45)">
      <rect width="95" height="35" rx="5" fill="#5a3d5a"/>
      <text x="10" y="15" fill="#f0e68c" font-family="monospace" font-size="11">__add__</text>
      <text x="10" y="28" fill="#b0b0b0" font-family="Inter, sans-serif" font-size="9">a + b</text>
    </g>

    <g transform="translate(120, 45)">
      <rect width="95" height="35" rx="5" fill="#5a3d5a"/>
      <text x="10" y="15" fill="#f0e68c" font-family="monospace" font-size="11">__sub__</text>
      <text x="10" y="28" fill="#b0b0b0" font-family="Inter, sans-serif" font-size="9">a - b</text>
    </g>

    <g transform="translate(15, 90)">
      <rect width="95" height="35" rx="5" fill="#5a3d5a"/>
      <text x="10" y="15" fill="#f0e68c" font-family="monospace" font-size="11">__mul__</text>
      <text x="10" y="28" fill="#b0b0b0" font-family="Inter, sans-serif" font-size="9">a * b</text>
    </g>

    <g transform="translate(120, 90)">
      <rect width="95" height="35" rx="5" fill="#5a3d5a"/>
      <text x="10" y="15" fill="#f0e68c" font-family="monospace" font-size="11">__truediv__</text>
      <text x="10" y="28" fill="#b0b0b0" font-family="Inter, sans-serif" font-size="9">a / b</text>
    </g>

    <g transform="translate(15, 135)">
      <rect width="200" height="35" rx="5" fill="#5a3d5a"/>
      <text x="10" y="15" fill="#f0e68c" font-family="monospace" font-size="11">__floordiv__ / __mod__</text>
      <text x="10" y="28" fill="#b0b0b0" font-family="Inter, sans-serif" font-size="9">a // b    /    a % b</text>
    </g>
  </g>

  <!-- Category 5: Ciclo de Vida -->
  <g transform="translate(285, 280)">
    <rect width="230" height="180" rx="10" fill="#2d4a4a" stroke="#4a9d9d" stroke-width="2"/>
    <text x="115" y="25" text-anchor="middle" fill="#6abdbd" font-family="Inter, sans-serif" font-size="14" font-weight="bold">🔄 Ciclo de Vida</text>

    <g transform="translate(15, 45)">
      <rect width="200" height="35" rx="5" fill="#3d5a5a"/>
      <text x="10" y="15" fill="#f0e68c" font-family="monospace" font-size="11">__new__</text>
      <text x="10" y="28" fill="#b0b0b0" font-family="Inter, sans-serif" font-size="9">Crear instancia</text>
    </g>

    <g transform="translate(15, 90)">
      <rect width="200" height="35" rx="5" fill="#3d5a5a"/>
      <text x="10" y="15" fill="#f0e68c" font-family="monospace" font-size="11">__init__</text>
      <text x="10" y="28" fill="#b0b0b0" font-family="Inter, sans-serif" font-size="9">Inicializar instancia</text>
    </g>

    <g transform="translate(15, 135)">
      <rect width="200" height="35" rx="5" fill="#3d5a5a"/>
      <text x="10" y="15" fill="#f0e68c" font-family="monospace" font-size="11">__del__</text>
      <text x="10" y="28" fill="#b0b0b0" font-family="Inter, sans-serif" font-size="9">Destruir instancia</text>
    </g>
  </g>

  <!-- Category 6: Otros -->
  <g transform="translate(540, 280)">
    <rect width="230" height="180" rx="10" fill="#4a4a2d" stroke="#9d9d4a" stroke-width="2"/>
    <text x="115" y="25" text-anchor="middle" fill="#bdbd6a" font-family="Inter, sans-serif" font-size="14" font-weight="bold">⚡ Otros Útiles</text>

    <g transform="translate(15, 45)">
      <rect width="200" height="35" rx="5" fill="#5a5a3d"/>
      <text x="10" y="15" fill="#f0e68c" font-family="monospace" font-size="11">__hash__</text>
      <text x="10" y="28" fill="#b0b0b0" font-family="Inter, sans-serif" font-size="9">hash(obj) / en sets y dicts</text>
    </g>

    <g transform="translate(15, 90)">
      <rect width="200" height="35" rx="5" fill="#5a5a3d"/>
      <text x="10" y="15" fill="#f0e68c" font-family="monospace" font-size="11">__bool__</text>
      <text x="10" y="28" fill="#b0b0b0" font-family="Inter, sans-serif" font-size="9">bool(obj) / if obj:</text>
    </g>

    <g transform="translate(15, 135)">
      <rect width="200" height="35" rx="5" fill="#5a5a3d"/>
      <text x="10" y="15" fill="#f0e68c" font-family="monospace" font-size="11">__call__</text>
      <text x="10" y="28" fill="#b0b0b0" font-family="Inter, sans-serif" font-size="9">obj() → callable</text>
    </g>
  </g>

  <!-- Footer tip -->
  <rect x="100" y="475" width="600" height="30" rx="5" fill="#252526" stroke="#444"/>
  <text x="400" y="495" text-anchor="middle" fill="#888" font-family="Inter, sans-serif" font-size="12">💡 Tip: Implementa __repr__ siempre, __str__ solo si necesitas salida para usuarios</text>
</svg>

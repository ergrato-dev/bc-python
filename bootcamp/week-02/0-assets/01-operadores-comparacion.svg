<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#1e1e1e"/>

  <!-- Title -->
  <text x="400" y="45" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="bold" fill="#FFD43B" text-anchor="middle">Operadores de Comparación en Python</text>

  <!-- Subtitle -->
  <text x="400" y="75" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#888" text-anchor="middle">Comparan dos valores y retornan True o False</text>

  <!-- Grid of operators - 3x2 -->
  <!-- Row 1 -->
  <!-- == Equal -->
  <g transform="translate(80, 110)">
    <rect width="200" height="100" rx="10" fill="#252526" stroke="#306998" stroke-width="2"/>
    <text x="100" y="35" font-family="monospace" font-size="28" font-weight="bold" fill="#FFD43B" text-anchor="middle">==</text>
    <text x="100" y="60" font-family="Inter, sans-serif" font-size="14" fill="#e0e0e0" text-anchor="middle">Igual a</text>
    <text x="100" y="85" font-family="monospace" font-size="12" fill="#4EC9B0" text-anchor="middle">5 == 5  →  True</text>
  </g>

  <!-- != Not Equal -->
  <g transform="translate(300, 110)">
    <rect width="200" height="100" rx="10" fill="#252526" stroke="#306998" stroke-width="2"/>
    <text x="100" y="35" font-family="monospace" font-size="28" font-weight="bold" fill="#FFD43B" text-anchor="middle">!=</text>
    <text x="100" y="60" font-family="Inter, sans-serif" font-size="14" fill="#e0e0e0" text-anchor="middle">Diferente de</text>
    <text x="100" y="85" font-family="monospace" font-size="12" fill="#4EC9B0" text-anchor="middle">5 != 3  →  True</text>
  </g>

  <!-- < Less than -->
  <g transform="translate(520, 110)">
    <rect width="200" height="100" rx="10" fill="#252526" stroke="#306998" stroke-width="2"/>
    <text x="100" y="35" font-family="monospace" font-size="28" font-weight="bold" fill="#FFD43B" text-anchor="middle">&lt;</text>
    <text x="100" y="60" font-family="Inter, sans-serif" font-size="14" fill="#e0e0e0" text-anchor="middle">Menor que</text>
    <text x="100" y="85" font-family="monospace" font-size="12" fill="#4EC9B0" text-anchor="middle">3 &lt; 5  →  True</text>
  </g>

  <!-- Row 2 -->
  <!-- > Greater than -->
  <g transform="translate(80, 230)">
    <rect width="200" height="100" rx="10" fill="#252526" stroke="#306998" stroke-width="2"/>
    <text x="100" y="35" font-family="monospace" font-size="28" font-weight="bold" fill="#FFD43B" text-anchor="middle">&gt;</text>
    <text x="100" y="60" font-family="Inter, sans-serif" font-size="14" fill="#e0e0e0" text-anchor="middle">Mayor que</text>
    <text x="100" y="85" font-family="monospace" font-size="12" fill="#4EC9B0" text-anchor="middle">7 &gt; 3  →  True</text>
  </g>

  <!-- <= Less or equal -->
  <g transform="translate(300, 230)">
    <rect width="200" height="100" rx="10" fill="#252526" stroke="#306998" stroke-width="2"/>
    <text x="100" y="35" font-family="monospace" font-size="28" font-weight="bold" fill="#FFD43B" text-anchor="middle">&lt;=</text>
    <text x="100" y="60" font-family="Inter, sans-serif" font-size="14" fill="#e0e0e0" text-anchor="middle">Menor o igual</text>
    <text x="100" y="85" font-family="monospace" font-size="12" fill="#4EC9B0" text-anchor="middle">5 &lt;= 5  →  True</text>
  </g>

  <!-- >= Greater or equal -->
  <g transform="translate(520, 230)">
    <rect width="200" height="100" rx="10" fill="#252526" stroke="#306998" stroke-width="2"/>
    <text x="100" y="35" font-family="monospace" font-size="28" font-weight="bold" fill="#FFD43B" text-anchor="middle">&gt;=</text>
    <text x="100" y="60" font-family="Inter, sans-serif" font-size="14" fill="#e0e0e0" text-anchor="middle">Mayor o igual</text>
    <text x="100" y="85" font-family="monospace" font-size="12" fill="#4EC9B0" text-anchor="middle">8 &gt;= 5  →  True</text>
  </g>

  <!-- Example section -->
  <rect x="80" y="360" width="640" height="110" rx="10" fill="#1e1e1e" stroke="#444" stroke-width="1"/>
  <text x="100" y="390" font-family="Inter, sans-serif" font-size="14" font-weight="bold" fill="#FFD43B">Ejemplo práctico:</text>

  <text x="100" y="420" font-family="monospace" font-size="13" fill="#569cd6">age</text>
  <text x="130" y="420" font-family="monospace" font-size="13" fill="#d4d4d4"> = </text>
  <text x="155" y="420" font-family="monospace" font-size="13" fill="#b5cea8">18</text>

  <text x="100" y="445" font-family="monospace" font-size="13" fill="#c586c0">if</text>
  <text x="125" y="445" font-family="monospace" font-size="13" fill="#569cd6"> age</text>
  <text x="165" y="445" font-family="monospace" font-size="13" fill="#d4d4d4"> &gt;= </text>
  <text x="200" y="445" font-family="monospace" font-size="13" fill="#b5cea8">18</text>
  <text x="220" y="445" font-family="monospace" font-size="13" fill="#d4d4d4">:</text>
  <text x="280" y="445" font-family="monospace" font-size="13" fill="#6a9955"># True → se ejecuta</text>

  <!-- Result indicator -->
  <circle cx="680" y="432" r="20" fill="#306998"/>
  <text x="680" y="438" font-family="Inter, sans-serif" font-size="12" fill="white" text-anchor="middle">bool</text>

  <!-- Footer -->
  <text x="400" y="490" font-family="Inter, sans-serif" font-size="11" fill="#666" text-anchor="middle">Python Bootcamp - Semana 02</text>
</svg>

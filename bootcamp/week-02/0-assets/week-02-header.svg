<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="pythonGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#306998"/>
      <stop offset="100%" style="stop-color:#FFD43B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="#1e1e1e"/>

  <!-- Decorative elements - Decision branches -->
  <g opacity="0.15">
    <!-- Central diamond (decision) -->
    <polygon points="400,30 430,60 400,90 370,60" fill="#306998"/>
    <!-- Left branch -->
    <line x1="370" y1="60" x2="300" y2="60" stroke="#306998" stroke-width="2"/>
    <circle cx="290" cy="60" r="8" fill="#4ade80"/>
    <!-- Right branch -->
    <line x1="430" y1="60" x2="500" y2="60" stroke="#306998" stroke-width="2"/>
    <circle cx="510" cy="60" r="8" fill="#f87171"/>
    <!-- Down branch -->
    <line x1="400" y1="90" x2="400" y2="120" stroke="#306998" stroke-width="2"/>
    <rect x="385" y="125" width="30" height="20" rx="3" fill="#60a5fa"/>
  </g>

  <!-- Week number badge -->
  <rect x="30" y="70" width="100" height="60" rx="8" fill="#306998"/>
  <text x="80" y="95" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500">SEMANA</text>
  <text x="80" y="120" text-anchor="middle" fill="#FFD43B" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700">02</text>

  <!-- Main title -->
  <text x="160" y="95" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700">Condicionales y</text>
  <text x="160" y="130" fill="#FFD43B" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700">Control de Flujo</text>

  <!-- Subtitle -->
  <text x="160" y="160" fill="#888888" font-family="Inter, system-ui, sans-serif" font-size="14">if/elif/else • match • operadores lógicos • truthiness</text>

  <!-- Right side icon - Decision flowchart -->
  <g transform="translate(620, 60)">
    <!-- Diamond shape -->
    <polygon points="60,0 90,30 60,60 30,30" fill="none" stroke="#306998" stroke-width="3"/>
    <text x="60" y="35" text-anchor="middle" fill="#306998" font-family="monospace" font-size="14" font-weight="bold">?</text>

    <!-- True path -->
    <line x1="90" y1="30" x2="130" y2="30" stroke="#4ade80" stroke-width="2"/>
    <text x="140" y="35" fill="#4ade80" font-family="monospace" font-size="12">True</text>

    <!-- False path -->
    <line x1="60" y1="60" x2="60" y2="90" stroke="#f87171" stroke-width="2"/>
    <text x="60" y="105" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="12">False</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="195" width="800" height="5" fill="url(#pythonGradient)"/>
</svg>

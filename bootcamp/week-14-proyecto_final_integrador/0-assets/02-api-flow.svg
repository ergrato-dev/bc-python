<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#bd93f9"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#50fa7b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="bold">🔄 Flujo de Consumo de API</text>

  <!-- User/CLI -->
  <rect x="30" y="100" width="100" height="80" rx="8" fill="#2d3a4f" stroke="#50fa7b" stroke-width="2" filter="url(#shadow)"/>
  <text x="80" y="130" text-anchor="middle" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="24">👤</text>
  <text x="80" y="155" text-anchor="middle" fill="#50fa7b" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold">Usuario</text>
  <text x="80" y="170" text-anchor="middle" fill="#6272a4" font-family="Inter, system-ui, sans-serif" font-size="10">CLI</text>

  <!-- CLI Handler -->
  <rect x="170" y="100" width="110" height="80" rx="8" fill="#2d3a4f" stroke="#ff79c6" stroke-width="2" filter="url(#shadow)"/>
  <text x="225" y="135" text-anchor="middle" fill="#ff79c6" font-family="monospace" font-size="12">cli.py</text>
  <text x="225" y="155" text-anchor="middle" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="11">handle_weather</text>
  <text x="225" y="170" text-anchor="middle" fill="#6272a4" font-family="Inter, system-ui, sans-serif" font-size="10">Comandos</text>

  <!-- Weather Service -->
  <rect x="320" y="100" width="130" height="80" rx="8" fill="#2d3a4f" stroke="#ffb86c" stroke-width="2" filter="url(#shadow)"/>
  <text x="385" y="135" text-anchor="middle" fill="#ffb86c" font-family="monospace" font-size="11">WeatherService</text>
  <text x="385" y="155" text-anchor="middle" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="11">get_current_weather</text>
  <text x="385" y="170" text-anchor="middle" fill="#6272a4" font-family="Inter, system-ui, sans-serif" font-size="10">Lógica</text>

  <!-- Weather Client -->
  <rect x="490" y="100" width="130" height="80" rx="8" fill="#2d3a4f" stroke="#8be9fd" stroke-width="2" filter="url(#shadow)"/>
  <text x="555" y="135" text-anchor="middle" fill="#8be9fd" font-family="monospace" font-size="11">WeatherClient</text>
  <text x="555" y="155" text-anchor="middle" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="11">requests.get()</text>
  <text x="555" y="170" text-anchor="middle" fill="#6272a4" font-family="Inter, system-ui, sans-serif" font-size="10">HTTP</text>

  <!-- API Cloud -->
  <ellipse cx="700" cy="140" rx="60" ry="40" fill="#44475a" stroke="#f1fa8c" stroke-width="2"/>
  <text x="700" y="135" text-anchor="middle" fill="#f1fa8c" font-family="Inter, system-ui, sans-serif" font-size="11">☁️ OpenWeather</text>
  <text x="700" y="150" text-anchor="middle" fill="#f1fa8c" font-family="Inter, system-ui, sans-serif" font-size="10">API</text>

  <!-- Request Arrows (top) -->
  <line x1="130" y1="125" x2="165" y2="125" stroke="#bd93f9" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="147" y="118" text-anchor="middle" fill="#bd93f9" font-family="Inter, system-ui, sans-serif" font-size="9">1</text>

  <line x1="280" y1="125" x2="315" y2="125" stroke="#bd93f9" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="297" y="118" text-anchor="middle" fill="#bd93f9" font-family="Inter, system-ui, sans-serif" font-size="9">2</text>

  <line x1="450" y1="125" x2="485" y2="125" stroke="#bd93f9" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="467" y="118" text-anchor="middle" fill="#bd93f9" font-family="Inter, system-ui, sans-serif" font-size="9">3</text>

  <line x1="620" y1="125" x2="638" y2="125" stroke="#bd93f9" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="629" y="118" text-anchor="middle" fill="#bd93f9" font-family="Inter, system-ui, sans-serif" font-size="9">4</text>

  <!-- Response Arrows (bottom) -->
  <line x1="638" y1="155" x2="620" y2="155" stroke="#50fa7b" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  <text x="629" y="165" text-anchor="middle" fill="#50fa7b" font-family="Inter, system-ui, sans-serif" font-size="9">5</text>

  <line x1="485" y1="155" x2="450" y2="155" stroke="#50fa7b" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  <text x="467" y="165" text-anchor="middle" fill="#50fa7b" font-family="Inter, system-ui, sans-serif" font-size="9">6</text>

  <line x1="315" y1="155" x2="280" y2="155" stroke="#50fa7b" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  <text x="297" y="165" text-anchor="middle" fill="#50fa7b" font-family="Inter, system-ui, sans-serif" font-size="9">7</text>

  <line x1="165" y1="155" x2="130" y2="155" stroke="#50fa7b" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  <text x="147" y="165" text-anchor="middle" fill="#50fa7b" font-family="Inter, system-ui, sans-serif" font-size="9">8</text>

  <!-- Step descriptions -->
  <rect x="30" y="220" width="740" height="200" rx="8" fill="#2d3a4f" stroke="#6272a4" stroke-width="1"/>
  <text x="50" y="245" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold">📋 Pasos del Flujo</text>

  <!-- Request steps -->
  <text x="50" y="275" fill="#bd93f9" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold">Request →</text>
  <text x="50" y="295" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="11">1. Usuario ejecuta: <tspan fill="#f1fa8c" font-family="monospace">weather-cli weather Madrid</tspan></text>
  <text x="50" y="315" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="11">2. CLI parsea argumentos y llama a <tspan fill="#ffb86c" font-family="monospace">WeatherService.get_current_weather("Madrid")</tspan></text>
  <text x="50" y="335" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="11">3. Service delega a <tspan fill="#8be9fd" font-family="monospace">WeatherClient.get_current_weather("Madrid")</tspan></text>
  <text x="50" y="355" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="11">4. Client hace HTTP GET: <tspan fill="#f1fa8c" font-family="monospace">/weather?q=Madrid&amp;appid=KEY&amp;units=metric</tspan></text>

  <!-- Response steps -->
  <text x="430" y="275" fill="#50fa7b" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold">← Response</text>
  <text x="430" y="295" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="11">5. API retorna JSON con datos del clima</text>
  <text x="430" y="315" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="11">6. Client parsea respuesta y maneja errores</text>
  <text x="430" y="335" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="11">7. Service crea <tspan fill="#ff79c6" font-family="monospace">Weather.from_api_response()</tspan></text>
  <text x="430" y="355" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="11">8. CLI muestra resultado formateado al usuario</text>

  <!-- HTTP Details -->
  <rect x="50" y="375" width="350" height="35" rx="4" fill="#363f52"/>
  <text x="60" y="395" fill="#8be9fd" font-family="monospace" font-size="10">GET /weather?q=Madrid&amp;appid=***&amp;units=metric&amp;lang=es</text>
  <text x="60" y="405" fill="#6272a4" font-family="Inter, system-ui, sans-serif" font-size="9">Headers: User-Agent, Accept: application/json</text>

  <rect x="420" y="375" width="340" height="35" rx="4" fill="#363f52"/>
  <text x="430" y="395" fill="#50fa7b" font-family="monospace" font-size="10">200 OK {"name":"Madrid","main":{"temp":22.5}...}</text>
  <text x="430" y="405" fill="#6272a4" font-family="Inter, system-ui, sans-serif" font-size="9">Content-Type: application/json</text>
</svg>

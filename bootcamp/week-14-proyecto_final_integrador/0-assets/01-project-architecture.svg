<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="bold">🏗️ Arquitectura del Proyecto - Weather Dashboard CLI</text>

  <!-- Layer Labels -->
  <text x="50" y="90" fill="#8be9fd" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold">CAPA</text>
  <text x="150" y="90" fill="#8be9fd" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold">COMPONENTES</text>
  <text x="550" y="90" fill="#8be9fd" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold">RESPONSABILIDAD</text>
  <text x="780" y="90" fill="#8be9fd" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold">EXTERNO</text>

  <!-- Presentation Layer -->
  <rect x="40" y="110" width="620" height="70" rx="8" fill="#2d3a4f" stroke="#50fa7b" stroke-width="2" filter="url(#shadow)"/>
  <text x="60" y="135" fill="#50fa7b" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold">PRESENTACIÓN</text>

  <rect x="150" y="120" width="100" height="50" rx="6" fill="#363f52"/>
  <text x="200" y="145" text-anchor="middle" fill="#f8f8f2" font-family="monospace" font-size="12">main.py</text>
  <text x="200" y="162" text-anchor="middle" fill="#6272a4" font-family="Inter, system-ui, sans-serif" font-size="10">Entrada</text>

  <rect x="270" y="120" width="100" height="50" rx="6" fill="#363f52"/>
  <text x="320" y="145" text-anchor="middle" fill="#f8f8f2" font-family="monospace" font-size="12">cli.py</text>
  <text x="320" y="162" text-anchor="middle" fill="#6272a4" font-family="Inter, system-ui, sans-serif" font-size="10">Comandos</text>

  <rect x="390" y="120" width="100" height="50" rx="6" fill="#363f52"/>
  <text x="440" y="145" text-anchor="middle" fill="#f8f8f2" font-family="monospace" font-size="12">display.py</text>
  <text x="440" y="162" text-anchor="middle" fill="#6272a4" font-family="Inter, system-ui, sans-serif" font-size="10">Formateo</text>

  <text x="550" y="150" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="11">Interfaz CLI</text>

  <!-- Arrow down -->
  <path d="M320 180 L320 200 L310 190 M320 200 L330 190" stroke="#bd93f9" stroke-width="2" fill="none"/>

  <!-- Service Layer -->
  <rect x="40" y="210" width="620" height="70" rx="8" fill="#2d3a4f" stroke="#ff79c6" stroke-width="2" filter="url(#shadow)"/>
  <text x="60" y="235" fill="#ff79c6" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold">SERVICIOS</text>

  <rect x="150" y="220" width="110" height="50" rx="6" fill="#363f52"/>
  <text x="205" y="242" text-anchor="middle" fill="#f8f8f2" font-family="monospace" font-size="11">weather_svc</text>
  <text x="205" y="259" text-anchor="middle" fill="#6272a4" font-family="Inter, system-ui, sans-serif" font-size="10">Clima</text>

  <rect x="280" y="220" width="110" height="50" rx="6" fill="#363f52"/>
  <text x="335" y="242" text-anchor="middle" fill="#f8f8f2" font-family="monospace" font-size="11">favorites_svc</text>
  <text x="335" y="259" text-anchor="middle" fill="#6272a4" font-family="Inter, system-ui, sans-serif" font-size="10">Favoritos</text>

  <rect x="410" y="220" width="110" height="50" rx="6" fill="#363f52"/>
  <text x="465" y="242" text-anchor="middle" fill="#f8f8f2" font-family="monospace" font-size="11">history_svc</text>
  <text x="465" y="259" text-anchor="middle" fill="#6272a4" font-family="Inter, system-ui, sans-serif" font-size="10">Historial</text>

  <text x="550" y="250" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="11">Lógica de negocio</text>

  <!-- Arrow down -->
  <path d="M320 280 L320 300 L310 290 M320 300 L330 290" stroke="#bd93f9" stroke-width="2" fill="none"/>

  <!-- Data Access Layer -->
  <rect x="40" y="310" width="620" height="70" rx="8" fill="#2d3a4f" stroke="#ffb86c" stroke-width="2" filter="url(#shadow)"/>
  <text x="60" y="335" fill="#ffb86c" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold">DATOS</text>

  <rect x="150" y="320" width="140" height="50" rx="6" fill="#363f52"/>
  <text x="220" y="342" text-anchor="middle" fill="#f8f8f2" font-family="monospace" font-size="11">weather_client</text>
  <text x="220" y="359" text-anchor="middle" fill="#6272a4" font-family="Inter, system-ui, sans-serif" font-size="10">API HTTP</text>

  <rect x="310" y="320" width="140" height="50" rx="6" fill="#363f52"/>
  <text x="380" y="342" text-anchor="middle" fill="#f8f8f2" font-family="monospace" font-size="11">json_storage</text>
  <text x="380" y="359" text-anchor="middle" fill="#6272a4" font-family="Inter, system-ui, sans-serif" font-size="10">Persistencia</text>

  <text x="550" y="350" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="11">Acceso externo</text>

  <!-- Arrow down -->
  <path d="M320 380 L320 400 L310 390 M320 400 L330 390" stroke="#bd93f9" stroke-width="2" fill="none"/>

  <!-- Models Layer -->
  <rect x="40" y="410" width="620" height="70" rx="8" fill="#2d3a4f" stroke="#8be9fd" stroke-width="2" filter="url(#shadow)"/>
  <text x="60" y="435" fill="#8be9fd" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold">MODELOS</text>

  <rect x="150" y="420" width="100" height="50" rx="6" fill="#363f52"/>
  <text x="200" y="445" text-anchor="middle" fill="#f8f8f2" font-family="monospace" font-size="12">Weather</text>
  <text x="200" y="462" text-anchor="middle" fill="#6272a4" font-family="Inter, system-ui, sans-serif" font-size="10">@dataclass</text>

  <rect x="270" y="420" width="100" height="50" rx="6" fill="#363f52"/>
  <text x="320" y="445" text-anchor="middle" fill="#f8f8f2" font-family="monospace" font-size="12">Forecast</text>
  <text x="320" y="462" text-anchor="middle" fill="#6272a4" font-family="Inter, system-ui, sans-serif" font-size="10">@dataclass</text>

  <rect x="390" y="420" width="100" height="50" rx="6" fill="#363f52"/>
  <text x="440" y="445" text-anchor="middle" fill="#f8f8f2" font-family="monospace" font-size="12">Config</text>
  <text x="440" y="462" text-anchor="middle" fill="#6272a4" font-family="Inter, system-ui, sans-serif" font-size="10">@dataclass</text>

  <text x="550" y="450" fill="#f8f8f2" font-family="Inter, system-ui, sans-serif" font-size="11">Entidades</text>

  <!-- External Resources Column -->
  <!-- API Cloud -->
  <rect x="700" y="310" width="160" height="55" rx="25" fill="#44475a" stroke="#f1fa8c" stroke-width="2"/>
  <text x="780" y="335" text-anchor="middle" fill="#f1fa8c" font-family="Inter, system-ui, sans-serif" font-size="12">☁️ OpenWeather</text>
  <text x="780" y="352" text-anchor="middle" fill="#6272a4" font-family="Inter, system-ui, sans-serif" font-size="10">API REST</text>

  <!-- JSON Files -->
  <rect x="700" y="410" width="160" height="55" rx="8" fill="#44475a" stroke="#f1fa8c" stroke-width="2"/>
  <text x="780" y="435" text-anchor="middle" fill="#f1fa8c" font-family="Inter, system-ui, sans-serif" font-size="12">📁 Archivos JSON</text>
  <text x="780" y="452" text-anchor="middle" fill="#6272a4" font-family="Inter, system-ui, sans-serif" font-size="10">favorites, history</text>

  <!-- Connection lines -->
  <path d="M290 345 L700 337" stroke="#f1fa8c" stroke-width="1.5" stroke-dasharray="5,3"/>
  <path d="M450 345 L700 437" stroke="#f1fa8c" stroke-width="1.5" stroke-dasharray="5,3"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a90d9"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="26" font-weight="bold">Fixture Scopes en pytest</text>
  <text x="450" y="65" text-anchor="middle" fill="#aaaaaa" font-family="Inter, sans-serif" font-size="14">Duración y ciclo de vida de las fixtures</text>

  <!-- Time arrow -->
  <line x1="50" y1="480" x2="850" y2="480" stroke="#555555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="870" y="485" fill="#888888" font-family="Inter, sans-serif" font-size="12">Tiempo</text>

  <!-- Scope: function -->
  <rect x="80" y="100" width="180" height="120" rx="8" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="170" y="130" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="16" font-weight="bold">scope="function"</text>
  <text x="170" y="155" text-anchor="middle" fill="#ffcccc" font-family="Inter, sans-serif" font-size="12">Default</text>
  <line x1="100" y1="170" x2="240" y2="170" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <text x="170" y="195" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="11">Nueva instancia</text>
  <text x="170" y="210" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="11">por cada test</text>

  <!-- Function scope timeline -->
  <rect x="90" y="440" width="40" height="25" rx="3" fill="#e74c3c"/>
  <text x="110" y="457" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="9">T1</text>
  <rect x="140" y="440" width="40" height="25" rx="3" fill="#e74c3c"/>
  <text x="160" y="457" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="9">T2</text>
  <rect x="190" y="440" width="40" height="25" rx="3" fill="#e74c3c"/>
  <text x="210" y="457" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="9">T3</text>

  <!-- Scope: class -->
  <rect x="290" y="100" width="180" height="120" rx="8" fill="#FFD43B" stroke="#ffd700" stroke-width="2"/>
  <text x="380" y="130" text-anchor="middle" fill="#1a1a2e" font-family="Inter, sans-serif" font-size="16" font-weight="bold">scope="class"</text>
  <line x1="310" y1="150" x2="450" y2="150" stroke="#1a1a2e" stroke-width="1" opacity="0.3"/>
  <text x="380" y="175" text-anchor="middle" fill="#1a1a1a" font-family="Inter, sans-serif" font-size="11">Una instancia</text>
  <text x="380" y="190" text-anchor="middle" fill="#1a1a1a" font-family="Inter, sans-serif" font-size="11">por clase de test</text>
  <text x="380" y="210" text-anchor="middle" fill="#333333" font-family="Inter, sans-serif" font-size="10">(class TestSomething)</text>

  <!-- Class scope timeline -->
  <rect x="300" y="440" width="150" height="25" rx="3" fill="#FFD43B"/>
  <text x="330" y="457" text-anchor="middle" fill="#1a1a2e" font-family="Inter, sans-serif" font-size="9">T1</text>
  <text x="375" y="457" text-anchor="middle" fill="#1a1a2e" font-family="Inter, sans-serif" font-size="9">T2</text>
  <text x="420" y="457" text-anchor="middle" fill="#1a1a2e" font-family="Inter, sans-serif" font-size="9">T3</text>

  <!-- Scope: module -->
  <rect x="500" y="100" width="180" height="120" rx="8" fill="#27ae60" stroke="#2ecc71" stroke-width="2"/>
  <text x="590" y="130" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="16" font-weight="bold">scope="module"</text>
  <line x1="520" y1="150" x2="660" y2="150" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <text x="590" y="175" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="11">Una instancia</text>
  <text x="590" y="190" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="11">por archivo .py</text>
  <text x="590" y="210" text-anchor="middle" fill="#c0ffc0" font-family="Inter, sans-serif" font-size="10">(test_module.py)</text>

  <!-- Module scope timeline -->
  <rect x="510" y="440" width="160" height="25" rx="3" fill="#27ae60"/>
  <text x="545" y="457" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="9">T1</text>
  <text x="590" y="457" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="9">T2</text>
  <text x="635" y="457" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="9">T3</text>

  <!-- Scope: session -->
  <rect x="710" y="100" width="170" height="120" rx="8" fill="#306998" stroke="#4a90d9" stroke-width="2"/>
  <text x="795" y="130" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="16" font-weight="bold">scope="session"</text>
  <line x1="730" y1="150" x2="860" y2="150" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <text x="795" y="175" text-anchor="middle" fill="#a0d0ff" font-family="Inter, sans-serif" font-size="11">Una instancia</text>
  <text x="795" y="190" text-anchor="middle" fill="#a0d0ff" font-family="Inter, sans-serif" font-size="11">para todos los tests</text>
  <text x="795" y="210" text-anchor="middle" fill="#80b0d0" font-family="Inter, sans-serif" font-size="10">(toda la sesión)</text>

  <!-- Session scope timeline -->
  <rect x="720" y="440" width="120" height="25" rx="3" fill="#306998"/>
  <text x="750" y="457" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="9">T1</text>
  <text x="780" y="457" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="9">T2</text>
  <text x="810" y="457" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="9">T3</text>

  <!-- Timeline labels -->
  <text x="170" y="425" text-anchor="middle" fill="#ff6b6b" font-family="Inter, sans-serif" font-size="10" font-weight="bold">3 instancias</text>
  <text x="375" y="425" text-anchor="middle" fill="#FFD43B" font-family="Inter, sans-serif" font-size="10" font-weight="bold">1 instancia</text>
  <text x="590" y="425" text-anchor="middle" fill="#2ecc71" font-family="Inter, sans-serif" font-size="10" font-weight="bold">1 instancia</text>
  <text x="780" y="425" text-anchor="middle" fill="#5dade2" font-family="Inter, sans-serif" font-size="10" font-weight="bold">1 instancia</text>

  <!-- Use cases section -->
  <rect x="80" y="250" width="180" height="100" rx="5" fill="#2a1a1a" stroke="#e74c3c" stroke-width="1"/>
  <text x="170" y="275" text-anchor="middle" fill="#e74c3c" font-family="Inter, sans-serif" font-size="12" font-weight="bold">Casos de uso:</text>
  <text x="95" y="300" fill="#ffcccc" font-family="Inter, sans-serif" font-size="10">• Tests aislados</text>
  <text x="95" y="318" fill="#ffcccc" font-family="Inter, sans-serif" font-size="10">• Estado mutable</text>
  <text x="95" y="336" fill="#ffcccc" font-family="Inter, sans-serif" font-size="10">• Sin efectos secundarios</text>

  <rect x="290" y="250" width="180" height="100" rx="5" fill="#2a2a1a" stroke="#FFD43B" stroke-width="1"/>
  <text x="380" y="275" text-anchor="middle" fill="#FFD43B" font-family="Inter, sans-serif" font-size="12" font-weight="bold">Casos de uso:</text>
  <text x="305" y="300" fill="#ffe680" font-family="Inter, sans-serif" font-size="10">• Setup por clase</text>
  <text x="305" y="318" fill="#ffe680" font-family="Inter, sans-serif" font-size="10">• Recursos compartidos</text>
  <text x="305" y="336" fill="#ffe680" font-family="Inter, sans-serif" font-size="10">• Tests relacionados</text>

  <rect x="500" y="250" width="180" height="100" rx="5" fill="#1a2a1a" stroke="#2ecc71" stroke-width="1"/>
  <text x="590" y="275" text-anchor="middle" fill="#2ecc71" font-family="Inter, sans-serif" font-size="12" font-weight="bold">Casos de uso:</text>
  <text x="515" y="300" fill="#c0ffc0" font-family="Inter, sans-serif" font-size="10">• Conexiones costosas</text>
  <text x="515" y="318" fill="#c0ffc0" font-family="Inter, sans-serif" font-size="10">• Datos de módulo</text>
  <text x="515" y="336" fill="#c0ffc0" font-family="Inter, sans-serif" font-size="10">• Cache de módulo</text>

  <rect x="710" y="250" width="170" height="100" rx="5" fill="#1a1a2a" stroke="#5dade2" stroke-width="1"/>
  <text x="795" y="275" text-anchor="middle" fill="#5dade2" font-family="Inter, sans-serif" font-size="12" font-weight="bold">Casos de uso:</text>
  <text x="725" y="300" fill="#c0e0ff" font-family="Inter, sans-serif" font-size="10">• Base de datos</text>
  <text x="725" y="318" fill="#c0e0ff" font-family="Inter, sans-serif" font-size="10">• Servidor de prueba</text>
  <text x="725" y="336" fill="#c0e0ff" font-family="Inter, sans-serif" font-size="10">• Recursos globales</text>

  <!-- Speed indicator -->
  <rect x="80" y="370" width="800" height="30" rx="5" fill="none" stroke="#666666" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="90" y="390" fill="#ff6b6b" font-family="Inter, sans-serif" font-size="11" font-weight="bold">Más Aislado</text>
  <text x="810" y="390" fill="#5dade2" font-family="Inter, sans-serif" font-size="11" font-weight="bold">Más Rápido</text>
  <line x1="200" y1="385" x2="700" y2="385" stroke="#444444" stroke-width="1"/>
  <polygon points="700,385 690,380 690,390" fill="#444444"/>
</svg>

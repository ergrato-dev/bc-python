<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>

  <rect width="800" height="200" fill="url(#bgGrad)"/>

  <!-- Dict visual -->
  <rect x="30" y="45" width="150" height="110" rx="8" fill="#306998" opacity="0.9"/>
  <text x="105" y="70" text-anchor="middle" fill="#FFD43B" font-family="monospace" font-size="11">"name": "Alice"</text>
  <text x="105" y="90" text-anchor="middle" fill="#FFD43B" font-family="monospace" font-size="11">"age": 25</text>
  <text x="105" y="110" text-anchor="middle" fill="#FFD43B" font-family="monospace" font-size="11">"city": "NYC"</text>
  <text x="105" y="140" text-anchor="middle" fill="#c0c0c0" font-family="Inter, sans-serif" font-size="12" font-weight="bold">Diccionario</text>

  <!-- Key-Value icon -->
  <rect x="200" y="50" width="100" height="100" rx="8" fill="#4CAF50" opacity="0.9"/>
  <text x="250" y="85" text-anchor="middle" fill="white" font-family="monospace" font-size="16">🔑 → 📦</text>
  <text x="250" y="110" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="11">key: value</text>
  <text x="250" y="135" text-anchor="middle" fill="#c0c0c0" font-family="Inter, sans-serif" font-size="10">pares únicos</text>

  <!-- Methods icon -->
  <rect x="320" y="50" width="100" height="100" rx="8" fill="#9C27B0" opacity="0.9"/>
  <text x="370" y="80" text-anchor="middle" fill="white" font-family="monospace" font-size="11">.get()</text>
  <text x="370" y="100" text-anchor="middle" fill="white" font-family="monospace" font-size="11">.keys()</text>
  <text x="370" y="120" text-anchor="middle" fill="white" font-family="monospace" font-size="11">.items()</text>
  <text x="370" y="140" text-anchor="middle" fill="#c0c0c0" font-family="Inter, sans-serif" font-size="10">métodos</text>

  <!-- Title section -->
  <text x="600" y="80" text-anchor="middle" fill="#FFD43B" font-family="Inter, sans-serif" font-size="36" font-weight="bold">Semana 06</text>
  <text x="600" y="115" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="22">Diccionarios</text>
  <text x="600" y="145" text-anchor="middle" fill="#a0a0a0" font-family="Inter, sans-serif" font-size="14">Estructuras de Datos II</text>

  <!-- Decorative elements -->
  <circle cx="760" cy="40" r="20" fill="#306998" opacity="0.6"/>
  <circle cx="750" cy="165" r="15" fill="#FFD43B" opacity="0.4"/>
  <circle cx="460" cy="170" r="10" fill="#4CAF50" opacity="0.5"/>
</svg>

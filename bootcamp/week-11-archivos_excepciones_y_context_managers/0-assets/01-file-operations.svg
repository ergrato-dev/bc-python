<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="35" font-family="Inter, sans-serif" font-size="22" font-weight="bold" fill="#FFD43B" text-anchor="middle">Operaciones con Archivos en Python</text>

  <!-- File Icon (center) -->
  <g transform="translate(350, 180)">
    <rect x="0" y="0" width="100" height="120" rx="5" fill="#2d2d44" stroke="#306998" stroke-width="2" filter="url(#shadow)"/>
    <path d="M70 0 L100 30 L70 30 Z" fill="#306998"/>
    <line x1="20" y1="50" x2="80" y2="50" stroke="#4a4a6a" stroke-width="2"/>
    <line x1="20" y1="65" x2="80" y2="65" stroke="#4a4a6a" stroke-width="2"/>
    <line x1="20" y1="80" x2="60" y2="80" stroke="#4a4a6a" stroke-width="2"/>
    <line x1="20" y1="95" x2="70" y2="95" stroke="#4a4a6a" stroke-width="2"/>
    <text x="50" y="140" font-family="Inter, sans-serif" font-size="12" fill="#a0a0a0" text-anchor="middle">archivo.txt</text>
  </g>

  <!-- READ Operation (left) -->
  <g transform="translate(80, 120)">
    <rect x="0" y="0" width="140" height="80" rx="8" fill="#1e3a5f" stroke="#306998" stroke-width="2" filter="url(#shadow)"/>
    <text x="70" y="30" font-family="Inter, sans-serif" font-size="14" font-weight="bold" fill="#FFD43B" text-anchor="middle">READ</text>
    <text x="70" y="50" font-family="monospace" font-size="11" fill="#82aaff" text-anchor="middle">open("r")</text>
    <text x="70" y="68" font-family="monospace" font-size="10" fill="#a0a0a0" text-anchor="middle">read() readline()</text>
  </g>
  <!-- Arrow from READ to File -->
  <path d="M220 160 L340 220" stroke="#306998" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#306998"/>
    </marker>
  </defs>

  <!-- WRITE Operation (right) -->
  <g transform="translate(580, 120)">
    <rect x="0" y="0" width="140" height="80" rx="8" fill="#3a1e5f" stroke="#9b59b6" stroke-width="2" filter="url(#shadow)"/>
    <text x="70" y="30" font-family="Inter, sans-serif" font-size="14" font-weight="bold" fill="#FFD43B" text-anchor="middle">WRITE</text>
    <text x="70" y="50" font-family="monospace" font-size="11" fill="#c792ea" text-anchor="middle">open("w")</text>
    <text x="70" y="68" font-family="monospace" font-size="10" fill="#a0a0a0" text-anchor="middle">write() writelines()</text>
  </g>
  <!-- Arrow from File to WRITE -->
  <path d="M460 220 L580 160" stroke="#9b59b6" stroke-width="2" fill="none" marker-start="url(#arrowhead2)"/>
  <defs>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#9b59b6"/>
    </marker>
  </defs>

  <!-- APPEND Operation (bottom left) -->
  <g transform="translate(80, 320)">
    <rect x="0" y="0" width="140" height="80" rx="8" fill="#1e5f3a" stroke="#27ae60" stroke-width="2" filter="url(#shadow)"/>
    <text x="70" y="30" font-family="Inter, sans-serif" font-size="14" font-weight="bold" fill="#FFD43B" text-anchor="middle">APPEND</text>
    <text x="70" y="50" font-family="monospace" font-size="11" fill="#a9dc76" text-anchor="middle">open("a")</text>
    <text x="70" y="68" font-family="monospace" font-size="10" fill="#a0a0a0" text-anchor="middle">añade al final</text>
  </g>
  <!-- Arrow from APPEND to File -->
  <path d="M220 360 L340 300" stroke="#27ae60" stroke-width="2" fill="none" marker-end="url(#arrowhead3)"/>
  <defs>
    <marker id="arrowhead3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
  </defs>

  <!-- BINARY Operation (bottom right) -->
  <g transform="translate(580, 320)">
    <rect x="0" y="0" width="140" height="80" rx="8" fill="#5f3a1e" stroke="#e67e22" stroke-width="2" filter="url(#shadow)"/>
    <text x="70" y="30" font-family="Inter, sans-serif" font-size="14" font-weight="bold" fill="#FFD43B" text-anchor="middle">BINARY</text>
    <text x="70" y="50" font-family="monospace" font-size="11" fill="#ffcb6b" text-anchor="middle">open("rb/wb")</text>
    <text x="70" y="68" font-family="monospace" font-size="10" fill="#a0a0a0" text-anchor="middle">imágenes, PDFs</text>
  </g>
  <!-- Arrow from File to BINARY -->
  <path d="M460 300 L580 360" stroke="#e67e22" stroke-width="2" fill="none"/>

  <!-- Encoding Note -->
  <g transform="translate(300, 420)">
    <rect x="0" y="0" width="200" height="50" rx="5" fill="#2d2d44" stroke="#4a4a6a" stroke-width="1"/>
    <text x="100" y="20" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">Encoding recomendado:</text>
    <text x="100" y="38" font-family="monospace" font-size="12" fill="#82aaff" text-anchor="middle">encoding="utf-8"</text>
  </g>

  <!-- Mode Legend -->
  <g transform="translate(30, 430)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" fill="#a0a0a0">Modos:</text>
    <text x="0" y="15" font-family="monospace" font-size="9" fill="#82aaff">"r" lectura</text>
    <text x="0" y="28" font-family="monospace" font-size="9" fill="#c792ea">"w" escritura</text>
    <text x="0" y="41" font-family="monospace" font-size="9" fill="#a9dc76">"a" append</text>
    <text x="0" y="54" font-family="monospace" font-size="9" fill="#ffcb6b">"x" exclusivo</text>
  </g>

  <!-- pathlib Note -->
  <g transform="translate(550, 430)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" fill="#a0a0a0">Moderno:</text>
    <text x="0" y="18" font-family="monospace" font-size="10" fill="#FFD43B">from pathlib import Path</text>
    <text x="0" y="34" font-family="monospace" font-size="10" fill="#82aaff">Path("file").read_text()</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550">
  <!-- Background -->
  <rect width="800" height="550" fill="#1e1e1e"/>

  <!-- Title -->
  <text x="400" y="40" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="bold" fill="#FFD43B" text-anchor="middle">Match Statements (Pattern Matching)</text>
  <text x="400" y="65" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#888" text-anchor="middle">Python 3.10+ • Comparación de patrones</text>

  <!-- Input value box -->
  <rect x="330" y="90" width="140" height="45" rx="8" fill="#306998" stroke="#FFD43B" stroke-width="2"/>
  <text x="400" y="110" font-family="monospace" font-size="12" fill="white" text-anchor="middle">match value</text>
  <text x="400" y="125" font-family="Inter, sans-serif" font-size="10" fill="#ccc" text-anchor="middle">valor a evaluar</text>

  <!-- Arrow down -->
  <line x1="400" y1="135" x2="400" y2="165" stroke="#888" stroke-width="2"/>
  <polygon points="400,175 395,165 405,165" fill="#888"/>

  <!-- Distribution node -->
  <circle cx="400" cy="190" r="15" fill="#252526" stroke="#c586c0" stroke-width="2"/>

  <!-- Branch lines -->
  <line x1="385" y1="190" x2="115" y2="250" stroke="#888" stroke-width="1.5"/>
  <line x1="393" y1="203" x2="280" y2="250" stroke="#888" stroke-width="1.5"/>
  <line x1="407" y1="203" x2="445" y2="250" stroke="#888" stroke-width="1.5"/>
  <line x1="415" y1="190" x2="610" y2="250" stroke="#888" stroke-width="1.5"/>

  <!-- Case 1: Literal string -->
  <g transform="translate(35, 250)">
    <rect width="160" height="90" rx="10" fill="#252526" stroke="#4EC9B0" stroke-width="2"/>
    <text x="80" y="25" font-family="monospace" font-size="11" fill="#c586c0" text-anchor="middle">case "start":</text>
    <text x="80" y="50" font-family="Inter, sans-serif" font-size="10" fill="#888" text-anchor="middle">Patrón literal</text>
    <rect x="20" y="60" width="120" height="22" rx="4" fill="#1e1e1e"/>
    <text x="80" y="76" font-family="monospace" font-size="9" fill="#4EC9B0" text-anchor="middle">"Iniciando..."</text>
  </g>

  <!-- Case 2: OR pattern -->
  <g transform="translate(200, 250)">
    <rect width="160" height="90" rx="10" fill="#252526" stroke="#569cd6" stroke-width="2"/>
    <text x="80" y="25" font-family="monospace" font-size="11" fill="#c586c0" text-anchor="middle">case "a" | "b":</text>
    <text x="80" y="50" font-family="Inter, sans-serif" font-size="10" fill="#888" text-anchor="middle">Patrón OR</text>
    <rect x="20" y="60" width="120" height="22" rx="4" fill="#1e1e1e"/>
    <text x="80" y="76" font-family="monospace" font-size="9" fill="#569cd6" text-anchor="middle">múltiples opciones</text>
  </g>

  <!-- Case 3: Guard -->
  <g transform="translate(365, 250)">
    <rect width="160" height="90" rx="10" fill="#252526" stroke="#ce9178" stroke-width="2"/>
    <text x="80" y="25" font-family="monospace" font-size="10" fill="#c586c0" text-anchor="middle">case n if n > 0:</text>
    <text x="80" y="50" font-family="Inter, sans-serif" font-size="10" fill="#888" text-anchor="middle">Con guarda (if)</text>
    <rect x="20" y="60" width="120" height="22" rx="4" fill="#1e1e1e"/>
    <text x="80" y="76" font-family="monospace" font-size="9" fill="#ce9178" text-anchor="middle">condición extra</text>
  </g>

  <!-- Case 4: Wildcard -->
  <g transform="translate(530, 250)">
    <rect width="160" height="90" rx="10" fill="#252526" stroke="#FFD43B" stroke-width="2"/>
    <text x="80" y="25" font-family="monospace" font-size="11" fill="#c586c0" text-anchor="middle">case _:</text>
    <text x="80" y="50" font-family="Inter, sans-serif" font-size="10" fill="#888" text-anchor="middle">Default (wildcard)</text>
    <rect x="20" y="60" width="120" height="22" rx="4" fill="#1e1e1e"/>
    <text x="80" y="76" font-family="monospace" font-size="9" fill="#FFD43B" text-anchor="middle">"cualquier otro"</text>
  </g>

  <!-- Code example -->
  <rect x="50" y="370" width="320" height="150" rx="10" fill="#1e1e1e" stroke="#444" stroke-width="1"/>
  <text x="70" y="395" font-family="Inter, sans-serif" font-size="12" font-weight="bold" fill="#FFD43B">Ejemplo de código:</text>

  <text x="70" y="420" font-family="monospace" font-size="11" fill="#c586c0">match</text>
  <text x="115" y="420" font-family="monospace" font-size="11" fill="#569cd6"> command</text>
  <text x="180" y="420" font-family="monospace" font-size="11" fill="#e0e0e0">:</text>

  <text x="85" y="445" font-family="monospace" font-size="11" fill="#c586c0">case</text>
  <text x="120" y="445" font-family="monospace" font-size="11" fill="#ce9178"> "start"</text>
  <text x="175" y="445" font-family="monospace" font-size="11" fill="#e0e0e0">:</text>
  <text x="195" y="445" font-family="monospace" font-size="10" fill="#6a9955"> # literal</text>

  <text x="85" y="465" font-family="monospace" font-size="11" fill="#c586c0">case</text>
  <text x="120" y="465" font-family="monospace" font-size="11" fill="#ce9178"> "a"</text>
  <text x="145" y="465" font-family="monospace" font-size="11" fill="#c586c0"> | </text>
  <text x="160" y="465" font-family="monospace" font-size="11" fill="#ce9178">"b"</text>
  <text x="180" y="465" font-family="monospace" font-size="11" fill="#e0e0e0">:</text>
  <text x="195" y="465" font-family="monospace" font-size="10" fill="#6a9955"> # OR</text>

  <text x="85" y="485" font-family="monospace" font-size="11" fill="#c586c0">case</text>
  <text x="120" y="485" font-family="monospace" font-size="11" fill="#569cd6"> n</text>
  <text x="135" y="485" font-family="monospace" font-size="11" fill="#c586c0"> if</text>
  <text x="155" y="485" font-family="monospace" font-size="11" fill="#569cd6"> n</text>
  <text x="170" y="485" font-family="monospace" font-size="11" fill="#e0e0e0"> > </text>
  <text x="190" y="485" font-family="monospace" font-size="11" fill="#b5cea8">0</text>
  <text x="200" y="485" font-family="monospace" font-size="11" fill="#e0e0e0">:</text>
  <text x="215" y="485" font-family="monospace" font-size="10" fill="#6a9955"> # guard</text>

  <text x="85" y="505" font-family="monospace" font-size="11" fill="#c586c0">case</text>
  <text x="120" y="505" font-family="monospace" font-size="11" fill="#FFD43B"> _</text>
  <text x="135" y="505" font-family="monospace" font-size="11" fill="#e0e0e0">:</text>
  <text x="155" y="505" font-family="monospace" font-size="10" fill="#6a9955"> # default</text>

  <!-- Tips box -->
  <rect x="400" y="370" width="350" height="150" rx="10" fill="#252526" stroke="#306998" stroke-width="1"/>
  <text x="420" y="395" font-family="Inter, sans-serif" font-size="12" font-weight="bold" fill="#FFD43B">💡 Tipos de patrones básicos:</text>

  <circle cx="430" cy="420" r="4" fill="#4EC9B0"/>
  <text x="445" y="425" font-family="Inter, sans-serif" font-size="11" fill="#e0e0e0">Literales: </text>
  <text x="510" y="425" font-family="monospace" font-size="10" fill="#ce9178">"texto"</text>
  <text x="560" y="425" font-family="Inter, sans-serif" font-size="11" fill="#e0e0e0">, </text>
  <text x="570" y="425" font-family="monospace" font-size="10" fill="#b5cea8">42</text>
  <text x="590" y="425" font-family="Inter, sans-serif" font-size="11" fill="#e0e0e0">, </text>
  <text x="600" y="425" font-family="monospace" font-size="10" fill="#4EC9B0">True</text>

  <circle cx="430" cy="450" r="4" fill="#569cd6"/>
  <text x="445" y="455" font-family="Inter, sans-serif" font-size="11" fill="#e0e0e0">OR: </text>
  <text x="475" y="455" font-family="monospace" font-size="10" fill="#e0e0e0">case "a" </text>
  <text x="545" y="455" font-family="monospace" font-size="10" fill="#c586c0">|</text>
  <text x="555" y="455" font-family="monospace" font-size="10" fill="#e0e0e0"> "b"</text>
  <text x="585" y="455" font-family="Inter, sans-serif" font-size="10" fill="#888"> (múltiples)</text>

  <circle cx="430" cy="480" r="4" fill="#ce9178"/>
  <text x="445" y="485" font-family="Inter, sans-serif" font-size="11" fill="#e0e0e0">Guardas: </text>
  <text x="505" y="485" font-family="monospace" font-size="10" fill="#e0e0e0">case n </text>
  <text x="555" y="485" font-family="monospace" font-size="10" fill="#c586c0">if</text>
  <text x="570" y="485" font-family="monospace" font-size="10" fill="#e0e0e0"> n > 0</text>

  <circle cx="430" cy="510" r="4" fill="#FFD43B"/>
  <text x="445" y="515" font-family="Inter, sans-serif" font-size="11" fill="#e0e0e0">Wildcard: </text>
  <text x="510" y="515" font-family="monospace" font-size="10" fill="#FFD43B">_</text>
  <text x="530" y="515" font-family="Inter, sans-serif" font-size="10" fill="#888"> (coincide con todo)</text>

  <!-- Footer -->
  <text x="400" y="540" font-family="Inter, sans-serif" font-size="11" fill="#666" text-anchor="middle">Python Bootcamp - Semana 02</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <defs>
    <style>
      .bg { fill: #1e1e1e; }
      .title { fill: #FFD43B; font-family: 'Segoe UI', sans-serif; font-size: 24px; font-weight: bold; }
      .subtitle { fill: #9CDCFE; font-family: 'Segoe UI', sans-serif; font-size: 14px; }
      .label { fill: #D4D4D4; font-family: 'Segoe UI', sans-serif; font-size: 13px; }
      .code { fill: #CE9178; font-family: 'Consolas', monospace; font-size: 14px; }
      .code-large { fill: #DCDCAA; font-family: 'Consolas', monospace; font-size: 18px; font-weight: bold; }
      .index { fill: #569CD6; font-family: 'Consolas', monospace; font-size: 12px; }
      .value { fill: #fff; font-family: 'Consolas', monospace; font-size: 14px; }
      .result { fill: #6A9955; font-family: 'Consolas', monospace; font-size: 13px; }
      .highlight { fill: #306998; }
      .box { fill: #252526; stroke: #3C3C3C; stroke-width: 2; }
      .cell { fill: #306998; stroke: #FFD43B; stroke-width: 2; }
      .cell-selected { fill: #4B8BBE; stroke: #FFD43B; stroke-width: 3; }
      .bracket { fill: #FFD43B; font-family: 'Consolas', monospace; font-size: 22px; font-weight: bold; }
      .param { fill: #9CDCFE; font-family: 'Consolas', monospace; font-size: 16px; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="800" height="480"/>

  <!-- Title -->
  <text class="title" x="400" y="35" text-anchor="middle">Slicing en Python</text>
  <text class="subtitle" x="400" y="55" text-anchor="middle">secuencia[start:stop:step]</text>

  <!-- Main syntax box -->
  <rect class="box" x="150" y="70" width="500" height="60" rx="8"/>
  <text class="bracket" x="200" y="108">[</text>
  <text class="param" x="220" y="108">start</text>
  <text class="bracket" x="280" y="108">:</text>
  <text class="param" x="300" y="108">stop</text>
  <text class="bracket" x="355" y="108">:</text>
  <text class="param" x="375" y="108">step</text>
  <text class="bracket" x="430" y="108">]</text>

  <text class="label" x="220" y="122" font-size="10">inicio</text>
  <text class="label" x="300" y="122" font-size="10">fin (excl.)</text>
  <text class="label" x="375" y="122" font-size="10">salto</text>

  <!-- Example list visualization -->
  <text class="code-large" x="50" y="170">numbers = [10, 20, 30, 40, 50, 60, 70]</text>

  <!-- Index row -->
  <text class="index" x="75" y="195">índice:</text>
  <text class="index" x="175" y="195">0</text>
  <text class="index" x="235" y="195">1</text>
  <text class="index" x="295" y="195">2</text>
  <text class="index" x="355" y="195">3</text>
  <text class="index" x="415" y="195">4</text>
  <text class="index" x="475" y="195">5</text>
  <text class="index" x="535" y="195">6</text>

  <!-- List cells -->
  <rect class="cell" x="160" y="205" width="50" height="35" rx="4"/>
  <text class="value" x="185" y="228" text-anchor="middle">10</text>

  <rect class="cell" x="220" y="205" width="50" height="35" rx="4"/>
  <text class="value" x="245" y="228" text-anchor="middle">20</text>

  <rect class="cell" x="280" y="205" width="50" height="35" rx="4"/>
  <text class="value" x="305" y="228" text-anchor="middle">30</text>

  <rect class="cell" x="340" y="205" width="50" height="35" rx="4"/>
  <text class="value" x="365" y="228" text-anchor="middle">40</text>

  <rect class="cell" x="400" y="205" width="50" height="35" rx="4"/>
  <text class="value" x="425" y="228" text-anchor="middle">50</text>

  <rect class="cell" x="460" y="205" width="50" height="35" rx="4"/>
  <text class="value" x="485" y="228" text-anchor="middle">60</text>

  <rect class="cell" x="520" y="205" width="50" height="35" rx="4"/>
  <text class="value" x="545" y="228" text-anchor="middle">70</text>

  <!-- Negative index row -->
  <text class="index" x="60" y="255" fill="#D16969">neg:</text>
  <text class="index" x="170" y="255" fill="#D16969">-7</text>
  <text class="index" x="230" y="255" fill="#D16969">-6</text>
  <text class="index" x="290" y="255" fill="#D16969">-5</text>
  <text class="index" x="350" y="255" fill="#D16969">-4</text>
  <text class="index" x="410" y="255" fill="#D16969">-3</text>
  <text class="index" x="470" y="255" fill="#D16969">-2</text>
  <text class="index" x="530" y="255" fill="#D16969">-1</text>

  <!-- Examples section -->
  <rect class="box" x="30" y="275" width="355" height="190" rx="8"/>
  <text class="subtitle" x="45" y="298">Ejemplos Básicos</text>

  <!-- Example 1 -->
  <text class="code" x="45" y="325">numbers[1:4]</text>
  <text class="result" x="190" y="325">→ [20, 30, 40]</text>
  <text class="label" x="45" y="340" font-size="10">índices 1, 2, 3 (4 excluido)</text>

  <!-- Example 2 -->
  <text class="code" x="45" y="365">numbers[:3]</text>
  <text class="result" x="190" y="365">→ [10, 20, 30]</text>
  <text class="label" x="45" y="380" font-size="10">desde inicio hasta 3 (excl.)</text>

  <!-- Example 3 -->
  <text class="code" x="45" y="405">numbers[4:]</text>
  <text class="result" x="190" y="405">→ [50, 60, 70]</text>
  <text class="label" x="45" y="420" font-size="10">desde 4 hasta el final</text>

  <!-- Example 4 -->
  <text class="code" x="45" y="445">numbers[-2:]</text>
  <text class="result" x="190" y="445">→ [60, 70]</text>
  <text class="label" x="45" y="460" font-size="10">últimos 2 elementos</text>

  <!-- Step examples -->
  <rect class="box" x="400" y="275" width="380" height="190" rx="8"/>
  <text class="subtitle" x="415" y="298">Con Step (Salto)</text>

  <!-- Step example 1 -->
  <text class="code" x="415" y="325">numbers[::2]</text>
  <text class="result" x="565" y="325">→ [10, 30, 50, 70]</text>
  <text class="label" x="415" y="340" font-size="10">cada 2 elementos</text>

  <!-- Step example 2 -->
  <text class="code" x="415" y="365">numbers[1::2]</text>
  <text class="result" x="565" y="365">→ [20, 40, 60]</text>
  <text class="label" x="415" y="380" font-size="10">desde 1, cada 2</text>

  <!-- Step example 3 -->
  <text class="code" x="415" y="405">numbers[::-1]</text>
  <text class="result" x="565" y="405">→ [70,60,50,40,30,20,10]</text>
  <text class="label" x="415" y="420" font-size="10">invertir lista</text>

  <!-- Step example 4 -->
  <text class="code" x="415" y="445">numbers[5:1:-1]</text>
  <text class="result" x="565" y="445">→ [60, 50, 40, 30]</text>
  <text class="label" x="415" y="460" font-size="10">reversa parcial</text>

  <!-- Visual highlight for [1:4] -->
  <rect x="218" y="203" width="174" height="39" rx="4" fill="none" stroke="#6A9955" stroke-width="3" stroke-dasharray="5,3"/>
  <text fill="#6A9955" font-size="11" font-family="Consolas" x="260" y="200">[1:4]</text>
</svg>

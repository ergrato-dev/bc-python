<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120">
  <!-- Background -->
  <rect width="600" height="120" fill="#1a1a2e"/>

  <!-- Week number circle -->
  <circle cx="60" cy="60" r="40" fill="#306998"/>
  <text x="60" y="55" font-family="system-ui, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">SEMANA</text>
  <text x="60" y="78" font-family="system-ui, sans-serif" font-size="28" fill="#FFD43B" text-anchor="middle" font-weight="bold">01</text>

  <!-- Title -->
  <text x="130" y="45" font-family="system-ui, sans-serif" font-size="24" fill="#ffffff" font-weight="bold">
    Introducción a Python
  </text>

  <!-- Subtitle -->
  <text x="130" y="72" font-family="system-ui, sans-serif" font-size="14" fill="#8892b0">
    Configuración del entorno y primeros pasos
  </text>

  <!-- Tags -->
  <g transform="translate(130, 85)">
    <rect x="0" y="0" width="60" height="20" rx="3" fill="#306998"/>
    <text x="30" y="14" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Variables</text>

    <rect x="70" y="0" width="45" height="20" rx="3" fill="#306998"/>
    <text x="92" y="14" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Tipos</text>

    <rect x="125" y="0" width="70" height="20" rx="3" fill="#306998"/>
    <text x="160" y="14" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Operadores</text>

    <rect x="205" y="0" width="50" height="20" rx="3" fill="#FFD43B"/>
    <text x="230" y="14" font-family="system-ui, sans-serif" font-size="10" fill="#1a1a2e" text-anchor="middle">Docker</text>
  </g>

  <!-- Hours badge -->
  <g transform="translate(520, 45)">
    <rect x="0" y="0" width="60" height="30" rx="4" fill="#252542"/>
    <text x="30" y="13" font-family="system-ui, sans-serif" font-size="8" fill="#8892b0" text-anchor="middle">DURACIÓN</text>
    <text x="30" y="25" font-family="system-ui, sans-serif" font-size="12" fill="#FFD43B" text-anchor="middle" font-weight="bold">6 horas</text>
  </g>

  <!-- Decorative corners -->
  <path d="M0,0 L30,0 L30,3 L3,3 L3,30 L0,30 Z" fill="#306998"/>
  <path d="M600,120 L570,120 L570,117 L597,117 L597,90 L600,90 Z" fill="#FFD43B"/>
</svg>

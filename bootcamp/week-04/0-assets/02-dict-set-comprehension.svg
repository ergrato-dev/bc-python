<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4fc3f7"/>
    </marker>
  </defs>
  
  <rect width="800" height="550" fill="#1e1e1e"/>
  
  <text x="400" y="40" text-anchor="middle" fill="#FFD43B" font-family="Inter, sans-serif" font-size="24" font-weight="bold">Dict y Set Comprehensions</text>
  
  <rect x="50" y="70" width="340" height="220" rx="12" fill="#2d2d2d" stroke="#306998" stroke-width="2"/>
  <text x="220" y="100" text-anchor="middle" fill="#306998" font-family="Inter, sans-serif" font-size="18" font-weight="bold">Dict Comprehension</text>
  
  <rect x="70" y="115" width="300" height="35" rx="6" fill="#3c3c3c"/>
  <text x="220" y="138" text-anchor="middle" fill="#e0e0e0" font-family="monospace" font-size="13">{key: value for item in iterable}</text>
  
  <text x="70" y="175" fill="#6a9955" font-family="monospace" font-size="12"># Crear diccionario de cuadrados</text>
  <text x="70" y="195" fill="#e0e0e0" font-family="monospace" font-size="12">
    <tspan fill="#9cdcfe">squares</tspan> = {<tspan fill="#9cdcfe">x</tspan>: <tspan fill="#9cdcfe">x</tspan>**<tspan fill="#b5cea8">2</tspan> <tspan fill="#569cd6">for</tspan> <tspan fill="#9cdcfe">x</tspan> <tspan fill="#569cd6">in</tspan> range(<tspan fill="#b5cea8">5</tspan>)}
  </text>
  
  <text x="70" y="225" fill="#6a9955" font-family="monospace" font-size="12"># Resultado:</text>
  <text x="70" y="245" fill="#4CAF50" font-family="monospace" font-size="12">{0: 0, 1: 1, 2: 4, 3: 9, 4: 16}</text>
  
  <rect x="70" y="260" width="300" height="20" rx="4" fill="#306998" opacity="0.3"/>
  <text x="220" y="275" text-anchor="middle" fill="#e0e0e0" font-family="Inter, sans-serif" font-size="11">key:value pairs</text>
  
  <rect x="410" y="70" width="340" height="220" rx="12" fill="#2d2d2d" stroke="#c586c0" stroke-width="2"/>
  <text x="580" y="100" text-anchor="middle" fill="#c586c0" font-family="Inter, sans-serif" font-size="18" font-weight="bold">Set Comprehension</text>
  
  <rect x="430" y="115" width="300" height="35" rx="6" fill="#3c3c3c"/>
  <text x="580" y="138" text-anchor="middle" fill="#e0e0e0" font-family="monospace" font-size="13">{expression for item in iterable}</text>
  
  <text x="430" y="175" fill="#6a9955" font-family="monospace" font-size="12"># Crear set de valores únicos</text>
  <text x="430" y="195" fill="#e0e0e0" font-family="monospace" font-size="12">
    <tspan fill="#9cdcfe">unique</tspan> = {<tspan fill="#9cdcfe">x</tspan>**<tspan fill="#b5cea8">2</tspan> <tspan fill="#569cd6">for</tspan> <tspan fill="#9cdcfe">x</tspan> <tspan fill="#569cd6">in</tspan> [<tspan fill="#b5cea8">-1</tspan>,<tspan fill="#b5cea8">1</tspan>,<tspan fill="#b5cea8">2</tspan>,<tspan fill="#b5cea8">-2</tspan>]}
  </text>
  
  <text x="430" y="225" fill="#6a9955" font-family="monospace" font-size="12"># Resultado (sin duplicados):</text>
  <text x="430" y="245" fill="#4CAF50" font-family="monospace" font-size="12">{1, 4}</text>
  
  <rect x="430" y="260" width="300" height="20" rx="4" fill="#c586c0" opacity="0.3"/>
  <text x="580" y="275" text-anchor="middle" fill="#e0e0e0" font-family="Inter, sans-serif" font-size="11">valores únicos</text>
  
  <text x="400" y="330" text-anchor="middle" fill="#888" font-family="Inter, sans-serif" font-size="14" font-weight="bold">COMPARACIÓN DE SINTAXIS</text>
  
  <rect x="50" y="350" width="220" height="80" rx="8" fill="#3c3c3c" stroke="#4CAF50" stroke-width="2"/>
  <text x="160" y="375" text-anchor="middle" fill="#4CAF50" font-family="Inter, sans-serif" font-size="14" font-weight="bold">List [ ]</text>
  <text x="160" y="400" text-anchor="middle" fill="#e0e0e0" font-family="monospace" font-size="12">[x for x in items]</text>
  <text x="160" y="420" text-anchor="middle" fill="#888" font-family="Inter, sans-serif" font-size="10">Ordenada, duplicados OK</text>
  
  <rect x="290" y="350" width="220" height="80" rx="8" fill="#3c3c3c" stroke="#306998" stroke-width="2"/>
  <text x="400" y="375" text-anchor="middle" fill="#306998" font-family="Inter, sans-serif" font-size="14" font-weight="bold">Dict { : }</text>
  <text x="400" y="400" text-anchor="middle" fill="#e0e0e0" font-family="monospace" font-size="12">{k:v for k,v in items}</text>
  <text x="400" y="420" text-anchor="middle" fill="#888" font-family="Inter, sans-serif" font-size="10">Pares clave:valor</text>
  
  <rect x="530" y="350" width="220" height="80" rx="8" fill="#3c3c3c" stroke="#c586c0" stroke-width="2"/>
  <text x="640" y="375" text-anchor="middle" fill="#c586c0" font-family="Inter, sans-serif" font-size="14" font-weight="bold">Set { }</text>
  <text x="640" y="400" text-anchor="middle" fill="#e0e0e0" font-family="monospace" font-size="12">{x for x in items}</text>
  <text x="640" y="420" text-anchor="middle" fill="#888" font-family="Inter, sans-serif" font-size="10">Únicos, sin orden</text>
  
  <rect x="50" y="455" width="700" height="75" rx="8" fill="#2d2d2d"/>
  <text x="70" y="480" fill="#FFD43B" font-family="Inter, sans-serif" font-size="14" font-weight="bold">💡 Tip: Diferencia clave</text>
  <text x="70" y="505" fill="#e0e0e0" font-family="Inter, sans-serif" font-size="13">• Dict usa <tspan fill="#306998" font-weight="bold">key: value</tspan> (con dos puntos)</text>
  <text x="70" y="522" fill="#e0e0e0" font-family="Inter, sans-serif" font-size="13">• Set usa <tspan fill="#c586c0" font-weight="bold">expression</tspan> solo (sin dos puntos) - Python detecta automáticamente que es un set</text>
</svg>

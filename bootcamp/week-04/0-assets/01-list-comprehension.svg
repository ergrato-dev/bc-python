<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#1e1e1e"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#FFD43B" font-family="Inter, sans-serif" font-size="24" font-weight="bold">List Comprehension</text>
  
  <!-- Syntax Box -->
  <rect x="50" y="70" width="700" height="60" rx="8" fill="#2d2d2d" stroke="#306998" stroke-width="2"/>
  <text x="400" y="108" text-anchor="middle" fill="#e0e0e0" font-family="monospace" font-size="18">
    [<tspan fill="#FFD43B">expression</tspan> <tspan fill="#569cd6">for</tspan> <tspan fill="#9cdcfe">item</tspan> <tspan fill="#569cd6">in</tspan> <tspan fill="#ce9178">iterable</tspan> <tspan fill="#569cd6">if</tspan> <tspan fill="#c586c0">condition</tspan>]
  </text>
  
  <!-- Flow Diagram -->
  <!-- Input: Iterable -->
  <rect x="50" y="170" width="140" height="70" rx="10" fill="#306998" filter="url(#shadow)"/>
  <text x="120" y="200" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="14" font-weight="bold">Iterable</text>
  <text x="120" y="220" text-anchor="middle" fill="#e0e0e0" font-family="monospace" font-size="12">[1, 2, 3, 4, 5]</text>
  
  <!-- Arrow 1 -->
  <path d="M190 205 L240 205" stroke="#4fc3f7" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <!-- For Loop Box -->
  <rect x="250" y="170" width="120" height="70" rx="10" fill="#3c3c3c" stroke="#569cd6" stroke-width="2"/>
  <text x="310" y="200" text-anchor="middle" fill="#569cd6" font-family="Inter, sans-serif" font-size="14" font-weight="bold">for item in</text>
  <text x="310" y="220" text-anchor="middle" fill="#9cdcfe" font-family="monospace" font-size="12">item = 1,2,3...</text>
  
  <!-- Arrow 2 -->
  <path d="M370 205 L420 205" stroke="#4fc3f7" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <!-- Condition Box (Optional) -->
  <rect x="430" y="170" width="120" height="70" rx="35" fill="#3c3c3c" stroke="#c586c0" stroke-width="2"/>
  <text x="490" y="200" text-anchor="middle" fill="#c586c0" font-family="Inter, sans-serif" font-size="14" font-weight="bold">if condition</text>
  <text x="490" y="220" text-anchor="middle" fill="#e0e0e0" font-family="monospace" font-size="11">item % 2 == 0</text>
  
  <!-- Arrow 3 -->
  <path d="M550 205 L600 205" stroke="#4fc3f7" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <!-- Expression Box -->
  <rect x="610" y="170" width="140" height="70" rx="10" fill="#3c3c3c" stroke="#FFD43B" stroke-width="2"/>
  <text x="680" y="200" text-anchor="middle" fill="#FFD43B" font-family="Inter, sans-serif" font-size="14" font-weight="bold">expression</text>
  <text x="680" y="220" text-anchor="middle" fill="#e0e0e0" font-family="monospace" font-size="12">item ** 2</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4fc3f7"/>
    </marker>
  </defs>
  
  <!-- Output Arrow -->
  <path d="M680 240 L680 280 L400 280 L400 310" stroke="#4CAF50" stroke-width="3" fill="none" marker-end="url(#arrowhead2)"/>
  
  <defs>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4CAF50"/>
    </marker>
  </defs>
  
  <!-- Output: New List -->
  <rect x="280" y="320" width="240" height="70" rx="10" fill="#4CAF50" filter="url(#shadow)"/>
  <text x="400" y="350" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="14" font-weight="bold">Nueva Lista</text>
  <text x="400" y="370" text-anchor="middle" fill="#e0e0e0" font-family="monospace" font-size="12">[4, 16] (cuadrados pares)</text>
  
  <!-- Example Section -->
  <rect x="50" y="420" width="700" height="60" rx="8" fill="#2d2d2d"/>
  <text x="60" y="445" fill="#6a9955" font-family="monospace" font-size="14"># Ejemplo completo</text>
  <text x="60" y="465" fill="#e0e0e0" font-family="monospace" font-size="14">
    <tspan fill="#9cdcfe">squares</tspan> <tspan fill="#e0e0e0">=</tspan> <tspan fill="#e0e0e0">[</tspan><tspan fill="#9cdcfe">x</tspan><tspan fill="#e0e0e0">**</tspan><tspan fill="#b5cea8">2</tspan> <tspan fill="#569cd6">for</tspan> <tspan fill="#9cdcfe">x</tspan> <tspan fill="#569cd6">in</tspan> <tspan fill="#ce9178">range</tspan><tspan fill="#e0e0e0">(</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e0e0e0">,</tspan><tspan fill="#b5cea8">6</tspan><tspan fill="#e0e0e0">)</tspan> <tspan fill="#569cd6">if</tspan> <tspan fill="#9cdcfe">x</tspan> <tspan fill="#e0e0e0">%</tspan> <tspan fill="#b5cea8">2</tspan> <tspan fill="#e0e0e0">==</tspan> <tspan fill="#b5cea8">0</tspan><tspan fill="#e0e0e0">]</tspan>
  </text>
  
  <!-- Labels -->
  <text x="120" y="155" text-anchor="middle" fill="#888" font-family="Inter, sans-serif" font-size="11">INPUT</text>
  <text x="265" y="360" text-anchor="end" fill="#888" font-family="Inter, sans-serif" font-size="11">OUTPUT</text>
</svg>

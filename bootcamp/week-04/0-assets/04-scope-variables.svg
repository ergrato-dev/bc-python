<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowUp" markerWidth="10" markerHeight="7" refX="5" refY="0" orient="auto">
      <polygon points="0 7, 5 0, 10 7" fill="#4fc3f7"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#1e1e1e"/>
  
  <text x="400" y="35" text-anchor="middle" fill="#FFD43B" font-family="Inter, sans-serif" font-size="24" font-weight="bold">Regla LEGB - Scope de Variables</text>
  <text x="400" y="55" text-anchor="middle" fill="#888" font-family="Inter, sans-serif" font-size="12">Orden de búsqueda de variables en Python</text>
  
  <rect x="50" y="80" width="700" height="100" rx="12" fill="#1a472a" stroke="#4CAF50" stroke-width="3" filter="url(#shadow)"/>
  <text x="80" y="115" fill="#4CAF50" font-family="Inter, sans-serif" font-size="20" font-weight="bold">B - Built-in</text>
  <text x="80" y="140" fill="#e0e0e0" font-family="Inter, sans-serif" font-size="13">Funciones y nombres predefinidos de Python</text>
  <text x="80" y="165" fill="#888" font-family="monospace" font-size="12">print(), len(), range(), True, False, None, Exception...</text>
  <text x="720" y="130" text-anchor="end" fill="#4CAF50" font-family="Inter, sans-serif" font-size="36" font-weight="bold">4</text>
  
  <rect x="80" y="195" width="640" height="100" rx="12" fill="#1a365d" stroke="#306998" stroke-width="3" filter="url(#shadow)"/>
  <text x="110" y="230" fill="#306998" font-family="Inter, sans-serif" font-size="20" font-weight="bold">G - Global</text>
  <text x="110" y="255" fill="#e0e0e0" font-family="Inter, sans-serif" font-size="13">Variables definidas a nivel de módulo (archivo)</text>
  <text x="110" y="280" fill="#888" font-family="monospace" font-size="12">MAX_SIZE = 100, config = {}, def my_func():...</text>
  <text x="690" y="245" text-anchor="end" fill="#306998" font-family="Inter, sans-serif" font-size="36" font-weight="bold">3</text>
  
  <rect x="110" y="310" width="580" height="100" rx="12" fill="#4a235a" stroke="#c586c0" stroke-width="3" filter="url(#shadow)"/>
  <text x="140" y="345" fill="#c586c0" font-family="Inter, sans-serif" font-size="20" font-weight="bold">E - Enclosing</text>
  <text x="140" y="370" fill="#e0e0e0" font-family="Inter, sans-serif" font-size="13">Scope de funciones externas (closures)</text>
  <text x="140" y="395" fill="#888" font-family="monospace" font-size="12">def outer(): x = 10 -&gt; def inner(): print(x)</text>
  <text x="660" y="360" text-anchor="end" fill="#c586c0" font-family="Inter, sans-serif" font-size="36" font-weight="bold">2</text>
  
  <rect x="140" y="425" width="520" height="100" rx="12" fill="#5c2c0a" stroke="#FFD43B" stroke-width="3" filter="url(#shadow)"/>
  <text x="170" y="460" fill="#FFD43B" font-family="Inter, sans-serif" font-size="20" font-weight="bold">L - Local</text>
  <text x="170" y="485" fill="#e0e0e0" font-family="Inter, sans-serif" font-size="13">Variables dentro de la función actual</text>
  <text x="170" y="510" fill="#888" font-family="monospace" font-size="12">def func(): result = x + y  (result es local)</text>
  <text x="630" y="475" text-anchor="end" fill="#FFD43B" font-family="Inter, sans-serif" font-size="36" font-weight="bold">1</text>
  
  <line x1="400" y1="525" x2="400" y2="80" stroke="#4fc3f7" stroke-width="4" stroke-dasharray="8,4" marker-end="url(#arrowUp)"/>
  <text x="425" y="555" fill="#4fc3f7" font-family="Inter, sans-serif" font-size="12">Orden de búsqueda</text>
  
  <rect x="50" y="545" width="700" height="45" rx="8" fill="#2d2d2d"/>
  <text x="70" y="572" fill="#FFD43B" font-family="Inter, sans-serif" font-size="12" font-weight="bold">💡 Python busca primero en Local, luego Enclosing, después Global, y finalmente Built-in</text>
</svg>

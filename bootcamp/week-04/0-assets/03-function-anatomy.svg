<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 580">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4fc3f7"/>
    </marker>
  </defs>
  
  <rect width="850" height="580" fill="#1e1e1e"/>
  
  <text x="400" y="40" text-anchor="middle" fill="#FFD43B" font-family="Inter, sans-serif" font-size="24" font-weight="bold">Anatomía de una Función</text>
  
  <rect x="100" y="70" width="600" height="200" rx="12" fill="#2d2d2d" stroke="#306998" stroke-width="2"/>
  
  <text x="120" y="105" fill="#569cd6" font-family="monospace" font-size="16" font-weight="bold">def</text>
  <text x="160" y="105" fill="#dcdcaa" font-family="monospace" font-size="16">calculate_total</text>
  <text x="310" y="105" fill="#e0e0e0" font-family="monospace" font-size="16">(</text>
  <text x="320" y="105" fill="#9cdcfe" font-family="monospace" font-size="16">price</text>
  <text x="368" y="105" fill="#e0e0e0" font-family="monospace" font-size="16">:</text>
  <text x="378" y="105" fill="#4ec9b0" font-family="monospace" font-size="16">float</text>
  <text x="420" y="105" fill="#e0e0e0" font-family="monospace" font-size="16">,</text>
  <text x="435" y="105" fill="#9cdcfe" font-family="monospace" font-size="16">qty</text>
  <text x="467" y="105" fill="#e0e0e0" font-family="monospace" font-size="16">:</text>
  <text x="477" y="105" fill="#4ec9b0" font-family="monospace" font-size="16">int</text>
  <text x="505" y="105" fill="#e0e0e0" font-family="monospace" font-size="16">=</text>
  <text x="518" y="105" fill="#b5cea8" font-family="monospace" font-size="16">1</text>
  <text x="530" y="105" fill="#e0e0e0" font-family="monospace" font-size="16">)</text>
  <text x="545" y="105" fill="#e0e0e0" font-family="monospace" font-size="16">-></text>
  <text x="570" y="105" fill="#4ec9b0" font-family="monospace" font-size="16">float</text>
  <text x="618" y="105" fill="#e0e0e0" font-family="monospace" font-size="16">:</text>
  
  <text x="140" y="135" fill="#ce9178" font-family="monospace" font-size="14">"""Calcula el total con impuestos."""</text>
  
  <text x="140" y="165" fill="#9cdcfe" font-family="monospace" font-size="14">TAX_RATE</text>
  <text x="218" y="165" fill="#e0e0e0" font-family="monospace" font-size="14">=</text>
  <text x="235" y="165" fill="#b5cea8" font-family="monospace" font-size="14">0.16</text>
  
  <text x="140" y="190" fill="#9cdcfe" font-family="monospace" font-size="14">subtotal</text>
  <text x="210" y="190" fill="#e0e0e0" font-family="monospace" font-size="14">=</text>
  <text x="225" y="190" fill="#9cdcfe" font-family="monospace" font-size="14">price</text>
  <text x="270" y="190" fill="#e0e0e0" font-family="monospace" font-size="14">*</text>
  <text x="285" y="190" fill="#9cdcfe" font-family="monospace" font-size="14">qty</text>
  
  <text x="140" y="215" fill="#9cdcfe" font-family="monospace" font-size="14">total</text>
  <text x="180" y="215" fill="#e0e0e0" font-family="monospace" font-size="14">=</text>
  <text x="195" y="215" fill="#9cdcfe" font-family="monospace" font-size="14">subtotal</text>
  <text x="270" y="215" fill="#e0e0e0" font-family="monospace" font-size="14">*</text>
  <text x="285" y="215" fill="#e0e0e0" font-family="monospace" font-size="14">(</text>
  <text x="293" y="215" fill="#b5cea8" font-family="monospace" font-size="14">1</text>
  <text x="303" y="215" fill="#e0e0e0" font-family="monospace" font-size="14">+</text>
  <text x="318" y="215" fill="#9cdcfe" font-family="monospace" font-size="14">TAX_RATE</text>
  <text x="395" y="215" fill="#e0e0e0" font-family="monospace" font-size="14">)</text>
  
  <text x="140" y="250" fill="#c586c0" font-family="monospace" font-size="14">return</text>
  <text x="195" y="250" fill="#9cdcfe" font-family="monospace" font-size="14">total</text>
  
  <line x1="115" y1="88" x2="115" y2="118" stroke="#FFD43B" stroke-width="3"/>
  <line x1="115" y1="88" x2="80" y2="88" stroke="#FFD43B" stroke-width="2"/>
  <text x="40" y="92" fill="#FFD43B" font-family="Inter, sans-serif" font-size="11" font-weight="bold">1. def</text>
  
  <line x1="160" y1="88" x2="160" y2="60" stroke="#dcdcaa" stroke-width="2"/>
  <text x="220" y="60" fill="#dcdcaa" font-family="Inter, sans-serif" font-size="11" font-weight="bold">2. Nombre</text>
  
  <line x1="420" y1="88" x2="420" y2="55" stroke="#9cdcfe" stroke-width="2"/>
  <text x="420" y="50" text-anchor="middle" fill="#9cdcfe" font-family="Inter, sans-serif" font-size="11" font-weight="bold">3. Parámetros</text>
  
  <line x1="595" y1="88" x2="595" y2="55" stroke="#4ec9b0" stroke-width="2"/>
  <text x="595" y="50" text-anchor="middle" fill="#4ec9b0" font-family="Inter, sans-serif" font-size="11" font-weight="bold">4. Return Type</text>
  
  <line x1="730" y1="135" x2="680" y2="135" stroke="#ce9178" stroke-width="2"/>
  <text x="745" y="139" fill="#ce9178" font-family="Inter, sans-serif" font-size="11" font-weight="bold">5. Docstring</text>
  
  <line x1="730" y1="200" x2="680" y2="200" stroke="#4CAF50" stroke-width="2"/>
  <text x="745" y="204" fill="#4CAF50" font-family="Inter, sans-serif" font-size="11" font-weight="bold">6. Body</text>
  
  <line x1="730" y1="250" x2="680" y2="250" stroke="#c586c0" stroke-width="2"/>
  <text x="745" y="254" fill="#c586c0" font-family="Inter, sans-serif" font-size="11" font-weight="bold">7. Return</text>
  
  <text x="400" y="310" text-anchor="middle" fill="#888" font-family="Inter, sans-serif" font-size="14" font-weight="bold">COMPONENTES</text>
  
  <rect x="50" y="330" width="160" height="90" rx="8" fill="#3c3c3c" stroke="#FFD43B" stroke-width="2"/>
  <text x="130" y="355" text-anchor="middle" fill="#FFD43B" font-family="Inter, sans-serif" font-size="13" font-weight="bold">def keyword</text>
  <text x="130" y="375" text-anchor="middle" fill="#e0e0e0" font-family="Inter, sans-serif" font-size="11">Palabra clave que</text>
  <text x="130" y="390" text-anchor="middle" fill="#e0e0e0" font-family="Inter, sans-serif" font-size="11">define una función</text>
  <text x="130" y="410" text-anchor="middle" fill="#888" font-family="Inter, sans-serif" font-size="10">obligatorio</text>
  
  <rect x="230" y="330" width="160" height="90" rx="8" fill="#3c3c3c" stroke="#9cdcfe" stroke-width="2"/>
  <text x="310" y="355" text-anchor="middle" fill="#9cdcfe" font-family="Inter, sans-serif" font-size="13" font-weight="bold">Parámetros</text>
  <text x="310" y="375" text-anchor="middle" fill="#e0e0e0" font-family="Inter, sans-serif" font-size="11">Inputs de la función</text>
  <text x="310" y="390" text-anchor="middle" fill="#e0e0e0" font-family="Inter, sans-serif" font-size="11">con type hints</text>
  <text x="310" y="410" text-anchor="middle" fill="#888" font-family="Inter, sans-serif" font-size="10">price: float, qty: int = 1</text>
  
  <rect x="410" y="330" width="160" height="90" rx="8" fill="#3c3c3c" stroke="#ce9178" stroke-width="2"/>
  <text x="490" y="355" text-anchor="middle" fill="#ce9178" font-family="Inter, sans-serif" font-size="13" font-weight="bold">Docstring</text>
  <text x="490" y="375" text-anchor="middle" fill="#e0e0e0" font-family="Inter, sans-serif" font-size="11">Documentación</text>
  <text x="490" y="390" text-anchor="middle" fill="#e0e0e0" font-family="Inter, sans-serif" font-size="11">de la función</text>
  <text x="490" y="410" text-anchor="middle" fill="#888" font-family="Inter, sans-serif" font-size="10">triple comillas</text>
  
  <rect x="590" y="330" width="160" height="90" rx="8" fill="#3c3c3c" stroke="#c586c0" stroke-width="2"/>
  <text x="670" y="355" text-anchor="middle" fill="#c586c0" font-family="Inter, sans-serif" font-size="13" font-weight="bold">Return</text>
  <text x="670" y="375" text-anchor="middle" fill="#e0e0e0" font-family="Inter, sans-serif" font-size="11">Devuelve valor</text>
  <text x="670" y="390" text-anchor="middle" fill="#e0e0e0" font-family="Inter, sans-serif" font-size="11">al llamador</text>
  <text x="670" y="410" text-anchor="middle" fill="#888" font-family="Inter, sans-serif" font-size="10">return total</text>
  
  <rect x="50" y="445" width="700" height="120" rx="8" fill="#2d2d2d"/>
  <text x="70" y="475" fill="#FFD43B" font-family="Inter, sans-serif" font-size="14" font-weight="bold">📝 Llamada a la función</text>
  <text x="70" y="505" fill="#e0e0e0" font-family="monospace" font-size="14">
    <tspan fill="#9cdcfe">result</tspan> = <tspan fill="#dcdcaa">calculate_total</tspan>(<tspan fill="#9cdcfe">price</tspan>=<tspan fill="#b5cea8">100.0</tspan>, <tspan fill="#9cdcfe">qty</tspan>=<tspan fill="#b5cea8">3</tspan>)
  </text>
  <text x="70" y="530" fill="#6a9955" font-family="monospace" font-size="14"># result = 348.0 (100 * 3 * 1.16)</text>
  <text x="70" y="555" fill="#888" font-family="Inter, sans-serif" font-size="12">Los argumentos se pasan por nombre (keyword arguments) para mayor claridad</text>
</svg>

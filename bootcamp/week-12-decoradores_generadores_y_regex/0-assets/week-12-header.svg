<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#headerGrad)"/>

  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="#306998" stroke-width="1" opacity="0.3"/>
  <circle cx="700" cy="100" r="60" fill="none" stroke="#FFD43B" stroke-width="1" opacity="0.3"/>

  <!-- Week number badge -->
  <g transform="translate(50, 70)">
    <rect x="0" y="0" width="80" height="60" rx="10" fill="#306998" opacity="0.8"/>
    <text x="40" y="25" font-family="Inter, sans-serif" font-size="12" fill="#a0a0a0" text-anchor="middle">SEMANA</text>
    <text x="40" y="50" font-family="Inter, sans-serif" font-size="28" font-weight="bold" fill="#FFD43B" text-anchor="middle">12</text>
  </g>

  <!-- Main title -->
  <text x="400" y="75" font-family="Inter, sans-serif" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#glow)">Decoradores, Generadores</text>
  <text x="400" y="115" font-family="Inter, sans-serif" font-size="28" font-weight="bold" fill="#FFD43B" text-anchor="middle">y Expresiones Regulares</text>

  <!-- Subtitle -->
  <text x="400" y="150" font-family="Inter, sans-serif" font-size="14" fill="#a0a0a0" text-anchor="middle">Metaprogramación y patrones de texto avanzados</text>

  <!-- Topic icons -->
  <g transform="translate(580, 60)">
    <!-- Decorator symbol @ -->
    <text x="0" y="25" font-family="monospace" font-size="24" fill="#306998">@</text>
    <!-- Generator symbol * -->
    <text x="40" y="25" font-family="monospace" font-size="24" fill="#27ae60">*</text>
    <!-- Regex symbol .* -->
    <text x="80" y="25" font-family="monospace" font-size="20" fill="#e67e22">.*</text>
  </g>

  <!-- Python logo hint -->
  <g transform="translate(720, 140)">
    <circle cx="0" cy="0" r="20" fill="#306998" opacity="0.6"/>
    <circle cx="15" cy="15" r="20" fill="#FFD43B" opacity="0.6"/>
  </g>

  <!-- Bottom accent line -->
  <rect x="150" y="180" width="500" height="3" rx="1" fill="#306998"/>
</svg>

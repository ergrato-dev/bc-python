<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4fc3f7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="35" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#4fc3f7" text-anchor="middle">Decorator Flow: How @decorator Works</text>

  <!-- Step 1: Original Function -->
  <g transform="translate(50, 70)">
    <rect x="0" y="0" width="200" height="100" rx="8" fill="#2d2d44" stroke="#306998" stroke-width="2"/>
    <text x="100" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFD43B" text-anchor="middle">① Original Function</text>
    <text x="100" y="50" font-family="monospace" font-size="12" fill="#a0a0a0" text-anchor="middle">def greet(name):</text>
    <text x="100" y="70" font-family="monospace" font-size="12" fill="#a0a0a0" text-anchor="middle">    return f"Hi, {name}"</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="260" y1="120" x2="310" y2="120" stroke="#4fc3f7" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 2: Decorator Function -->
  <g transform="translate(320, 70)">
    <rect x="0" y="0" width="220" height="100" rx="8" fill="#2d2d44" stroke="#306998" stroke-width="2"/>
    <text x="110" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFD43B" text-anchor="middle">② Decorator</text>
    <text x="110" y="50" font-family="monospace" font-size="12" fill="#a0a0a0" text-anchor="middle">def timer(func):</text>
    <text x="110" y="70" font-family="monospace" font-size="12" fill="#a0a0a0" text-anchor="middle">    def wrapper(...):</text>
    <text x="110" y="85" font-family="monospace" font-size="10" fill="#888" text-anchor="middle">        # add behavior</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="550" y1="120" x2="600" y2="120" stroke="#4fc3f7" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 3: Wrapped Function -->
  <g transform="translate(610, 70)">
    <rect x="0" y="0" width="160" height="100" rx="8" fill="#2d2d44" stroke="#4CAF50" stroke-width="2"/>
    <text x="80" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4CAF50" text-anchor="middle">③ Wrapped</text>
    <text x="80" y="55" font-family="monospace" font-size="12" fill="#a0a0a0" text-anchor="middle">greet = </text>
    <text x="80" y="75" font-family="monospace" font-size="12" fill="#a0a0a0" text-anchor="middle">timer(greet)</text>
  </g>

  <!-- Detailed Flow Section -->
  <text x="400" y="210" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFD43B" text-anchor="middle">Execution Flow when calling greet("World")</text>

  <!-- Flow boxes -->
  <!-- Box 1: Call -->
  <g transform="translate(50, 240)">
    <rect x="0" y="0" width="140" height="70" rx="8" fill="#1e3a5f" stroke="#4fc3f7" stroke-width="2"/>
    <text x="70" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4fc3f7" text-anchor="middle">1. CALL</text>
    <text x="70" y="45" font-family="monospace" font-size="11" fill="#a0a0a0" text-anchor="middle">greet("World")</text>
    <text x="70" y="60" font-family="Arial, sans-serif" font-size="10" fill="#888" text-anchor="middle">→ calls wrapper</text>
  </g>

  <!-- Arrow -->
  <line x1="200" y1="275" x2="230" y2="275" stroke="#4fc3f7" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Box 2: Before -->
  <g transform="translate(240, 240)">
    <rect x="0" y="0" width="140" height="70" rx="8" fill="#1e3a5f" stroke="#4fc3f7" stroke-width="2"/>
    <text x="70" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4fc3f7" text-anchor="middle">2. BEFORE</text>
    <text x="70" y="45" font-family="monospace" font-size="11" fill="#a0a0a0" text-anchor="middle">start = time()</text>
    <text x="70" y="60" font-family="Arial, sans-serif" font-size="10" fill="#888" text-anchor="middle">pre-processing</text>
  </g>

  <!-- Arrow -->
  <line x1="390" y1="275" x2="420" y2="275" stroke="#4fc3f7" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Box 3: Execute -->
  <g transform="translate(430, 240)">
    <rect x="0" y="0" width="140" height="70" rx="8" fill="#2d4a2d" stroke="#4CAF50" stroke-width="2"/>
    <text x="70" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4CAF50" text-anchor="middle">3. EXECUTE</text>
    <text x="70" y="45" font-family="monospace" font-size="11" fill="#a0a0a0" text-anchor="middle">func(*args)</text>
    <text x="70" y="60" font-family="Arial, sans-serif" font-size="10" fill="#888" text-anchor="middle">original function</text>
  </g>

  <!-- Arrow -->
  <line x1="580" y1="275" x2="610" y2="275" stroke="#4fc3f7" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Box 4: After -->
  <g transform="translate(620, 240)">
    <rect x="0" y="0" width="140" height="70" rx="8" fill="#1e3a5f" stroke="#4fc3f7" stroke-width="2"/>
    <text x="70" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4fc3f7" text-anchor="middle">4. AFTER</text>
    <text x="70" y="45" font-family="monospace" font-size="11" fill="#a0a0a0" text-anchor="middle">elapsed = ...</text>
    <text x="70" y="60" font-family="Arial, sans-serif" font-size="10" fill="#888" text-anchor="middle">post-processing</text>
  </g>

  <!-- Code Example Section -->
  <g transform="translate(50, 340)">
    <rect x="0" y="0" width="340" height="130" rx="8" fill="#252540" stroke="#306998" stroke-width="1"/>
    <text x="170" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFD43B" text-anchor="middle">Complete Decorator Pattern</text>
    <text x="15" y="42" font-family="monospace" font-size="11" fill="#c792ea">@functools.wraps(func)</text>
    <text x="15" y="58" font-family="monospace" font-size="11" fill="#89ddff">def</text>
    <text x="45" y="58" font-family="monospace" font-size="11" fill="#82aaff"> wrapper</text>
    <text x="100" y="58" font-family="monospace" font-size="11" fill="#a0a0a0">(*args, **kwargs):</text>
    <text x="25" y="74" font-family="monospace" font-size="11" fill="#888"># Before</text>
    <text x="25" y="90" font-family="monospace" font-size="11" fill="#a0a0a0">result = func(*args, **kwargs)</text>
    <text x="25" y="106" font-family="monospace" font-size="11" fill="#888"># After</text>
    <text x="25" y="122" font-family="monospace" font-size="11" fill="#c792ea">return</text>
    <text x="75" y="122" font-family="monospace" font-size="11" fill="#a0a0a0"> result</text>
  </g>

  <!-- Key Points -->
  <g transform="translate(420, 340)">
    <rect x="0" y="0" width="340" height="130" rx="8" fill="#252540" stroke="#4CAF50" stroke-width="1"/>
    <text x="170" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4CAF50" text-anchor="middle">Key Points</text>
    <text x="15" y="45" font-family="Arial, sans-serif" font-size="11" fill="#a0a0a0">✓ @decorator = func = decorator(func)</text>
    <text x="15" y="65" font-family="Arial, sans-serif" font-size="11" fill="#a0a0a0">✓ Always use @functools.wraps</text>
    <text x="15" y="85" font-family="Arial, sans-serif" font-size="11" fill="#a0a0a0">✓ Preserve *args, **kwargs signature</text>
    <text x="15" y="105" font-family="Arial, sans-serif" font-size="11" fill="#a0a0a0">✓ Multiple decorators: bottom to top</text>
    <text x="15" y="122" font-family="Arial, sans-serif" font-size="11" fill="#888">   @a → @b → f = a(b(f))</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4fc3f7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="35" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#4fc3f7" text-anchor="middle">Iterator Protocol: __iter__ and __next__</text>

  <!-- Iterable vs Iterator explanation -->
  <g transform="translate(30, 60)">
    <!-- Iterable box -->
    <rect x="0" y="0" width="230" height="120" rx="8" fill="#252540" stroke="#FFD43B" stroke-width="2"/>
    <text x="115" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFD43B" text-anchor="middle">ITERABLE</text>
    <text x="115" y="50" font-family="Arial, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">Has __iter__() method</text>
    <text x="20" y="75" font-family="monospace" font-size="10" fill="#888">Examples:</text>
    <text x="20" y="92" font-family="monospace" font-size="10" fill="#a0a0a0">list, tuple, str, dict</text>
    <text x="20" y="107" font-family="monospace" font-size="10" fill="#a0a0a0">set, range, file</text>
  </g>

  <!-- Arrow between -->
  <g transform="translate(270, 100)">
    <line x1="0" y1="20" x2="50" y2="20" stroke="#4fc3f7" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="25" y="10" font-family="monospace" font-size="10" fill="#4fc3f7" text-anchor="middle">iter()</text>
  </g>

  <!-- Iterator box -->
  <g transform="translate(330, 60)">
    <rect x="0" y="0" width="230" height="120" rx="8" fill="#252540" stroke="#4CAF50" stroke-width="2"/>
    <text x="115" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4CAF50" text-anchor="middle">ITERATOR</text>
    <text x="115" y="50" font-family="Arial, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">Has __iter__() + __next__()</text>
    <text x="20" y="75" font-family="monospace" font-size="10" fill="#888">Features:</text>
    <text x="20" y="92" font-family="monospace" font-size="10" fill="#a0a0a0">• Remembers position</text>
    <text x="20" y="107" font-family="monospace" font-size="10" fill="#a0a0a0">• Single-use (exhausts)</text>
  </g>

  <!-- next() arrow -->
  <g transform="translate(570, 100)">
    <line x1="0" y1="20" x2="50" y2="20" stroke="#4fc3f7" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="25" y="10" font-family="monospace" font-size="10" fill="#4fc3f7" text-anchor="middle">next()</text>
  </g>

  <!-- Value box -->
  <g transform="translate(630, 85)">
    <rect x="0" y="0" width="140" height="70" rx="8" fill="#1e3a5f" stroke="#4fc3f7" stroke-width="2"/>
    <text x="70" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4fc3f7" text-anchor="middle">VALUE</text>
    <text x="70" y="48" font-family="Arial, sans-serif" font-size="10" fill="#a0a0a0" text-anchor="middle">or</text>
    <text x="70" y="62" font-family="monospace" font-size="10" fill="#f44336" text-anchor="middle">StopIteration</text>
  </g>

  <!-- Custom Iterator Class -->
  <g transform="translate(30, 200)">
    <rect x="0" y="0" width="360" height="180" rx="8" fill="#252540" stroke="#306998" stroke-width="2"/>
    <text x="180" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFD43B" text-anchor="middle">Custom Iterator Class</text>

    <text x="15" y="48" font-family="monospace" font-size="11" fill="#89ddff">class</text>
    <text x="50" y="48" font-family="monospace" font-size="11" fill="#82aaff"> Counter</text>
    <text x="102" y="48" font-family="monospace" font-size="11" fill="#a0a0a0">:</text>

    <text x="25" y="68" font-family="monospace" font-size="11" fill="#89ddff">def</text>
    <text x="52" y="68" font-family="monospace" font-size="11" fill="#82aaff"> __init__</text>
    <text x="105" y="68" font-family="monospace" font-size="11" fill="#a0a0a0">(self, max):</text>
    <text x="35" y="85" font-family="monospace" font-size="11" fill="#a0a0a0">self.max, self.n = max, 0</text>

    <text x="25" y="108" font-family="monospace" font-size="11" fill="#89ddff">def</text>
    <text x="52" y="108" font-family="monospace" font-size="11" fill="#FFD43B"> __iter__</text>
    <text x="105" y="108" font-family="monospace" font-size="11" fill="#a0a0a0">(self):</text>
    <text x="35" y="125" font-family="monospace" font-size="11" fill="#c792ea">return</text>
    <text x="78" y="125" font-family="monospace" font-size="11" fill="#a0a0a0"> self</text>
    <text x="115" y="125" font-family="monospace" font-size="11" fill="#888"># Returns iterator</text>

    <text x="25" y="148" font-family="monospace" font-size="11" fill="#89ddff">def</text>
    <text x="52" y="148" font-family="monospace" font-size="11" fill="#4CAF50"> __next__</text>
    <text x="105" y="148" font-family="monospace" font-size="11" fill="#a0a0a0">(self):</text>
    <text x="35" y="165" font-family="monospace" font-size="11" fill="#89ddff">if</text>
    <text x="52" y="165" font-family="monospace" font-size="11" fill="#a0a0a0"> self.n >= self.max:</text>
    <text x="185" y="165" font-family="monospace" font-size="11" fill="#c792ea">raise</text>
    <text x="220" y="165" font-family="monospace" font-size="11" fill="#f44336"> StopIteration</text>
  </g>

  <!-- For Loop Desugaring -->
  <g transform="translate(410, 200)">
    <rect x="0" y="0" width="360" height="180" rx="8" fill="#252540" stroke="#4CAF50" stroke-width="2"/>
    <text x="180" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#4CAF50" text-anchor="middle">How "for" Loop Works</text>

    <text x="15" y="50" font-family="monospace" font-size="11" fill="#888"># This syntax:</text>
    <text x="15" y="68" font-family="monospace" font-size="11" fill="#89ddff">for</text>
    <text x="38" y="68" font-family="monospace" font-size="11" fill="#a0a0a0"> item</text>
    <text x="70" y="68" font-family="monospace" font-size="11" fill="#89ddff"> in</text>
    <text x="90" y="68" font-family="monospace" font-size="11" fill="#a0a0a0"> iterable:</text>

    <text x="15" y="95" font-family="monospace" font-size="11" fill="#888"># Is equivalent to:</text>
    <text x="15" y="113" font-family="monospace" font-size="11" fill="#a0a0a0">iterator = </text>
    <text x="95" y="113" font-family="monospace" font-size="11" fill="#82aaff">iter</text>
    <text x="120" y="113" font-family="monospace" font-size="11" fill="#a0a0a0">(iterable)</text>
    <text x="15" y="130" font-family="monospace" font-size="11" fill="#89ddff">while</text>
    <text x="52" y="130" font-family="monospace" font-size="11" fill="#c792ea"> True</text>
    <text x="80" y="130" font-family="monospace" font-size="11" fill="#a0a0a0">:</text>
    <text x="25" y="147" font-family="monospace" font-size="11" fill="#89ddff">try</text>
    <text x="45" y="147" font-family="monospace" font-size="11" fill="#a0a0a0">: item = </text>
    <text x="110" y="147" font-family="monospace" font-size="11" fill="#82aaff">next</text>
    <text x="140" y="147" font-family="monospace" font-size="11" fill="#a0a0a0">(iterator)</text>
    <text x="25" y="164" font-family="monospace" font-size="11" fill="#89ddff">except</text>
    <text x="70" y="164" font-family="monospace" font-size="11" fill="#f44336"> StopIteration</text>
    <text x="165" y="164" font-family="monospace" font-size="11" fill="#a0a0a0">:</text>
    <text x="175" y="164" font-family="monospace" font-size="11" fill="#89ddff"> break</text>
  </g>

  <!-- Key differences summary -->
  <g transform="translate(30, 400)">
    <rect x="0" y="0" width="740" height="80" rx="8" fill="#252540" stroke="#c792ea" stroke-width="1"/>
    <text x="370" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#c792ea" text-anchor="middle">Key Differences</text>

    <!-- Iterable column -->
    <text x="130" y="45" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFD43B" text-anchor="middle">Iterable</text>
    <text x="130" y="62" font-family="Arial, sans-serif" font-size="10" fill="#a0a0a0" text-anchor="middle">Can be looped multiple times</text>
    <text x="130" y="75" font-family="monospace" font-size="10" fill="#888" text-anchor="middle">list, dict, str</text>

    <!-- Divider -->
    <line x1="270" y1="35" x2="270" y2="75" stroke="#555" stroke-width="1"/>

    <!-- Iterator column -->
    <text x="400" y="45" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#4CAF50" text-anchor="middle">Iterator</text>
    <text x="400" y="62" font-family="Arial, sans-serif" font-size="10" fill="#a0a0a0" text-anchor="middle">Single-use, exhausts after one pass</text>
    <text x="400" y="75" font-family="monospace" font-size="10" fill="#888" text-anchor="middle">iter(list), file, generator</text>

    <!-- Divider -->
    <line x1="530" y1="35" x2="530" y2="75" stroke="#555" stroke-width="1"/>

    <!-- Generator column -->
    <text x="640" y="45" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7" text-anchor="middle">Generator</text>
    <text x="640" y="62" font-family="Arial, sans-serif" font-size="10" fill="#a0a0a0" text-anchor="middle">Iterator + lazy evaluation</text>
    <text x="640" y="75" font-family="monospace" font-size="10" fill="#888" text-anchor="middle">def f(): yield x</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#1e1e1e"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#FFD43B" font-family="Inter, sans-serif" font-size="24" font-weight="bold">Paradigmas de Programación</text>

  <!-- Procedural Programming Box -->
  <g transform="translate(50, 80)">
    <rect width="200" height="180" rx="10" fill="#2d2d2d" stroke="#666" stroke-width="2"/>
    <text x="100" y="30" text-anchor="middle" fill="#f0f0f0" font-family="Inter, sans-serif" font-size="16" font-weight="bold">Procedural</text>

    <!-- Code lines -->
    <rect x="20" y="50" width="160" height="20" rx="3" fill="#3c3c3c"/>
    <text x="30" y="65" fill="#9cdcfe" font-family="monospace" font-size="11">data = [1, 2, 3]</text>

    <rect x="20" y="80" width="160" height="20" rx="3" fill="#3c3c3c"/>
    <text x="30" y="95" fill="#9cdcfe" font-family="monospace" font-size="11">process(data)</text>

    <rect x="20" y="110" width="160" height="20" rx="3" fill="#3c3c3c"/>
    <text x="30" y="125" fill="#9cdcfe" font-family="monospace" font-size="11">save(data)</text>

    <text x="100" y="160" text-anchor="middle" fill="#888" font-family="Inter, sans-serif" font-size="12">Datos + Funciones</text>
    <text x="100" y="175" text-anchor="middle" fill="#888" font-family="Inter, sans-serif" font-size="12">separados</text>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(260, 160)">
    <path d="M0,10 L30,10" stroke="#FFD43B" stroke-width="3" fill="none"/>
    <polygon points="30,10 20,5 20,15" fill="#FFD43B"/>
  </g>

  <!-- OOP Box (highlighted) -->
  <g transform="translate(300, 80)">
    <rect width="200" height="180" rx="10" fill="#1e3a5f" stroke="#306998" stroke-width="3" filter="url(#shadow1)"/>
    <text x="100" y="30" text-anchor="middle" fill="#FFD43B" font-family="Inter, sans-serif" font-size="16" font-weight="bold">OOP (POO)</text>

    <!-- Object representation -->
    <rect x="30" y="50" width="140" height="100" rx="8" fill="#2d4a6f" stroke="#4a90d9" stroke-width="2"/>
    <text x="100" y="70" text-anchor="middle" fill="#f0f0f0" font-family="Inter, sans-serif" font-size="12" font-weight="bold">Objeto</text>

    <line x1="30" y1="80" x2="170" y2="80" stroke="#4a90d9" stroke-width="1"/>

    <text x="45" y="100" fill="#9cdcfe" font-family="monospace" font-size="10">name = "Ana"</text>
    <text x="45" y="115" fill="#9cdcfe" font-family="monospace" font-size="10">age = 25</text>

    <line x1="30" y1="125" x2="170" y2="125" stroke="#4a90d9" stroke-width="1"/>

    <text x="45" y="142" fill="#dcdcaa" font-family="monospace" font-size="10">greet()</text>

    <text x="100" y="175" text-anchor="middle" fill="#aaa" font-family="Inter, sans-serif" font-size="12">Datos + Métodos juntos</text>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(510, 160)">
    <path d="M0,10 L30,10" stroke="#888" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
    <polygon points="30,10 20,5 20,15" fill="#888"/>
  </g>

  <!-- Functional Box -->
  <g transform="translate(550, 80)">
    <rect width="200" height="180" rx="10" fill="#2d2d2d" stroke="#666" stroke-width="2"/>
    <text x="100" y="30" text-anchor="middle" fill="#f0f0f0" font-family="Inter, sans-serif" font-size="16" font-weight="bold">Funcional</text>

    <!-- Lambda/function -->
    <rect x="20" y="50" width="160" height="20" rx="3" fill="#3c3c3c"/>
    <text x="30" y="65" fill="#c586c0" font-family="monospace" font-size="11">map(fn, data)</text>

    <rect x="20" y="80" width="160" height="20" rx="3" fill="#3c3c3c"/>
    <text x="30" y="95" fill="#c586c0" font-family="monospace" font-size="11">filter(pred, x)</text>

    <rect x="20" y="110" width="160" height="20" rx="3" fill="#3c3c3c"/>
    <text x="30" y="125" fill="#c586c0" font-family="monospace" font-size="11">reduce(fn, acc)</text>

    <text x="100" y="160" text-anchor="middle" fill="#888" font-family="Inter, sans-serif" font-size="12">Funciones puras</text>
    <text x="100" y="175" text-anchor="middle" fill="#888" font-family="Inter, sans-serif" font-size="12">sin estado</text>
  </g>

  <!-- Four Pillars of OOP -->
  <text x="400" y="300" text-anchor="middle" fill="#f0f0f0" font-family="Inter, sans-serif" font-size="18" font-weight="bold">Los 4 Pilares de la POO</text>

  <!-- Pillar 1: Encapsulamiento -->
  <g transform="translate(80, 330)">
    <rect width="140" height="130" rx="8" fill="#2d4a2d" stroke="#4a9d4a" stroke-width="2"/>
    <text x="70" y="30" text-anchor="middle" fill="#98d998" font-family="Inter, sans-serif" font-size="13" font-weight="bold">Encapsulamiento</text>
    <circle cx="70" cy="70" r="25" fill="#3d5a3d" stroke="#6abd6a" stroke-width="2"/>
    <text x="70" y="75" text-anchor="middle" fill="#f0f0f0" font-family="Inter, sans-serif" font-size="20">🔒</text>
    <text x="70" y="115" text-anchor="middle" fill="#aaa" font-family="Inter, sans-serif" font-size="10">Ocultar detalles</text>
  </g>

  <!-- Pillar 2: Abstracción -->
  <g transform="translate(250, 330)">
    <rect width="140" height="130" rx="8" fill="#4a2d4a" stroke="#9d4a9d" stroke-width="2"/>
    <text x="70" y="30" text-anchor="middle" fill="#d998d9" font-family="Inter, sans-serif" font-size="13" font-weight="bold">Abstracción</text>
    <circle cx="70" cy="70" r="25" fill="#5a3d5a" stroke="#bd6abd" stroke-width="2"/>
    <text x="70" y="75" text-anchor="middle" fill="#f0f0f0" font-family="Inter, sans-serif" font-size="20">🎭</text>
    <text x="70" y="115" text-anchor="middle" fill="#aaa" font-family="Inter, sans-serif" font-size="10">Simplificar complejidad</text>
  </g>

  <!-- Pillar 3: Herencia -->
  <g transform="translate(420, 330)">
    <rect width="140" height="130" rx="8" fill="#4a4a2d" stroke="#9d9d4a" stroke-width="2"/>
    <text x="70" y="30" text-anchor="middle" fill="#d9d998" font-family="Inter, sans-serif" font-size="13" font-weight="bold">Herencia</text>
    <circle cx="70" cy="70" r="25" fill="#5a5a3d" stroke="#bdbd6a" stroke-width="2"/>
    <text x="70" y="75" text-anchor="middle" fill="#f0f0f0" font-family="Inter, sans-serif" font-size="20">👪</text>
    <text x="70" y="115" text-anchor="middle" fill="#aaa" font-family="Inter, sans-serif" font-size="10">Reutilizar código</text>
  </g>

  <!-- Pillar 4: Polimorfismo -->
  <g transform="translate(590, 330)">
    <rect width="140" height="130" rx="8" fill="#2d4a4a" stroke="#4a9d9d" stroke-width="2"/>
    <text x="70" y="30" text-anchor="middle" fill="#98d9d9" font-family="Inter, sans-serif" font-size="13" font-weight="bold">Polimorfismo</text>
    <circle cx="70" cy="70" r="25" fill="#3d5a5a" stroke="#6abdbd" stroke-width="2"/>
    <text x="70" y="75" text-anchor="middle" fill="#f0f0f0" font-family="Inter, sans-serif" font-size="20">🔄</text>
    <text x="70" y="115" text-anchor="middle" fill="#aaa" font-family="Inter, sans-serif" font-size="10">Múltiples formas</text>
  </g>

  <!-- Footer -->
  <text x="400" y="485" text-anchor="middle" fill="#666" font-family="Inter, sans-serif" font-size="11">Semana 08 • Clases y Objetos</text>
</svg>

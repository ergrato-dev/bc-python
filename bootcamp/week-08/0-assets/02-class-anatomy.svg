<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550">
  <defs>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="550" fill="#1e1e1e"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#FFD43B" font-family="Inter, sans-serif" font-size="24" font-weight="bold">Anatomía de una Clase Python</text>

  <!-- Main Class Box -->
  <g transform="translate(100, 70)">
    <!-- Class container -->
    <rect width="600" height="420" rx="12" fill="#252526" stroke="#306998" stroke-width="3" filter="url(#shadow2)"/>

    <!-- Class header -->
    <rect width="600" height="50" rx="12" fill="#306998"/>
    <rect y="40" width="600" height="15" fill="#306998"/>
    <text x="300" y="35" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="18" font-weight="bold">class Book:</text>

    <!-- Docstring section -->
    <g transform="translate(20, 65)">
      <rect width="560" height="45" rx="6" fill="#2d2d2d" stroke="#4a4a4a" stroke-width="1"/>
      <text x="15" y="20" fill="#6a9955" font-family="monospace" font-size="12">"""Representa un libro en la biblioteca."""</text>
      <text x="490" y="35" fill="#888" font-family="Inter, sans-serif" font-size="10">← Docstring</text>
    </g>

    <!-- Class Attribute section -->
    <g transform="translate(20, 125)">
      <rect width="560" height="50" rx="6" fill="#1e3a5f" stroke="#4a90d9" stroke-width="2"/>
      <text x="15" y="22" fill="#9cdcfe" font-family="monospace" font-size="13">total_books: int = 0</text>
      <text x="15" y="40" fill="#6a9955" font-family="monospace" font-size="11"># Compartido por todas las instancias</text>

      <!-- Label -->
      <rect x="400" y="10" width="145" height="28" rx="4" fill="#4a90d9"/>
      <text x="472" y="29" text-anchor="middle" fill="#fff" font-family="Inter, sans-serif" font-size="11" font-weight="bold">Atributo de Clase</text>
    </g>

    <!-- __init__ section -->
    <g transform="translate(20, 190)">
      <rect width="560" height="110" rx="6" fill="#3d2d1e" stroke="#d99a4a" stroke-width="2"/>

      <text x="15" y="22" fill="#dcdcaa" font-family="monospace" font-size="13">def __init__(self, title: str, author: str) -&gt; None:</text>
      <text x="30" y="45" fill="#6a9955" font-family="monospace" font-size="11">"""Inicializa un nuevo libro."""</text>
      <text x="30" y="68" fill="#9cdcfe" font-family="monospace" font-size="13">self.title = title</text>
      <text x="30" y="88" fill="#9cdcfe" font-family="monospace" font-size="13">self.author = author</text>
      <text x="30" y="105" fill="#9cdcfe" font-family="monospace" font-size="13">Book.total_books += 1</text>

      <!-- Label -->
      <rect x="430" y="5" width="115" height="28" rx="4" fill="#d99a4a"/>
      <text x="487" y="24" text-anchor="middle" fill="#fff" font-family="Inter, sans-serif" font-size="11" font-weight="bold">Inicializador</text>
    </g>

    <!-- Instance method section -->
    <g transform="translate(20, 315)">
      <rect width="560" height="70" rx="6" fill="#2d3d2d" stroke="#4a9d4a" stroke-width="2"/>

      <text x="15" y="22" fill="#dcdcaa" font-family="monospace" font-size="13">def get_info(self) -&gt; str:</text>
      <text x="30" y="45" fill="#6a9955" font-family="monospace" font-size="11">"""Retorna información del libro."""</text>
      <text x="30" y="65" fill="#c586c0" font-family="monospace" font-size="13">return f"{self.title} por {self.author}"</text>

      <!-- Label -->
      <rect x="390" y="5" width="155" height="28" rx="4" fill="#4a9d4a"/>
      <text x="467" y="24" text-anchor="middle" fill="#fff" font-family="Inter, sans-serif" font-size="11" font-weight="bold">Método de Instancia</text>
    </g>

    <!-- self annotations -->
    <g transform="translate(20, 400)">
      <rect width="560" height="30" rx="4" fill="#2d2d2d"/>
      <text x="280" y="20" text-anchor="middle" fill="#888" font-family="Inter, sans-serif" font-size="12">self = referencia a la instancia actual</text>
    </g>
  </g>

  <!-- Right side annotations -->
  <g transform="translate(720, 150)">
    <circle cx="0" cy="0" r="5" fill="#306998"/>
    <line x1="5" y1="0" x2="50" y2="0" stroke="#306998" stroke-width="2"/>
    <text x="15" y="-10" fill="#888" font-family="Inter, sans-serif" font-size="10">Nombre</text>
  </g>

  <g transform="translate(720, 255)">
    <circle cx="0" cy="0" r="5" fill="#d99a4a"/>
    <line x1="5" y1="0" x2="50" y2="0" stroke="#d99a4a" stroke-width="2"/>
    <text x="15" y="-10" fill="#888" font-family="Inter, sans-serif" font-size="10">Constructor</text>
  </g>

  <!-- Legend -->
  <g transform="translate(100, 510)">
    <rect x="0" y="0" width="15" height="15" rx="2" fill="#1e3a5f" stroke="#4a90d9"/>
    <text x="22" y="12" fill="#aaa" font-family="Inter, sans-serif" font-size="11">Atributo de clase</text>

    <rect x="150" y="0" width="15" height="15" rx="2" fill="#3d2d1e" stroke="#d99a4a"/>
    <text x="172" y="12" fill="#aaa" font-family="Inter, sans-serif" font-size="11">Inicializador (__init__)</text>

    <rect x="340" y="0" width="15" height="15" rx="2" fill="#2d3d2d" stroke="#4a9d4a"/>
    <text x="362" y="12" fill="#aaa" font-family="Inter, sans-serif" font-size="11">Método de instancia</text>

    <rect x="520" y="0" width="15" height="15" rx="2" fill="#2d2d2d" stroke="#4a4a4a"/>
    <text x="542" y="12" fill="#aaa" font-family="Inter, sans-serif" font-size="11">Docstring</text>
  </g>
</svg>

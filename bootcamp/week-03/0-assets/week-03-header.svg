<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <!-- Background -->
  <rect width="800" height="200" fill="#1e1e1e"/>

  <!-- Decorative loop pattern -->
  <g opacity="0.1">
    <circle cx="50" cy="100" r="40" fill="none" stroke="#FFD43B" stroke-width="3"/>
    <circle cx="750" cy="100" r="40" fill="none" stroke="#FFD43B" stroke-width="3"/>
    <path d="M 100 60 Q 200 20, 300 60 T 500 60 T 700 60" fill="none" stroke="#306998" stroke-width="2"/>
    <path d="M 100 140 Q 200 180, 300 140 T 500 140 T 700 140" fill="none" stroke="#306998" stroke-width="2"/>
  </g>

  <!-- Week number badge -->
  <circle cx="100" cy="100" r="45" fill="#306998"/>
  <text x="100" y="95" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#FFD43B" text-anchor="middle">SEMANA</text>
  <text x="100" y="120" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">03</text>

  <!-- Title -->
  <text x="400" y="85" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="bold" fill="#FFD43B" text-anchor="middle">Bucles y Control de Flujo</text>

  <!-- Subtitle -->
  <text x="400" y="120" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#e0e0e0" text-anchor="middle">for • while • range • break • continue</text>

  <!-- Loop icon -->
  <g transform="translate(680, 70)">
    <circle cx="20" cy="30" r="25" fill="none" stroke="#4EC9B0" stroke-width="3"/>
    <path d="M 35 15 L 45 30 L 35 45" fill="none" stroke="#4EC9B0" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Iteration dots -->
  <g transform="translate(200, 150)">
    <circle cx="0" cy="0" r="4" fill="#4EC9B0"/>
    <circle cx="25" cy="0" r="4" fill="#4EC9B0"/>
    <circle cx="50" cy="0" r="4" fill="#4EC9B0"/>
    <circle cx="75" cy="0" r="4" fill="#FFD43B"/>
    <circle cx="100" cy="0" r="4" fill="#888"/>
    <circle cx="125" cy="0" r="4" fill="#888"/>
  </g>

  <!-- Progress bar -->
  <rect x="200" y="165" width="400" height="6" rx="3" fill="#333"/>
  <rect x="200" y="165" width="86" height="6" rx="3" fill="#306998"/>
  <text x="610" y="172" font-family="Inter, sans-serif" font-size="11" fill="#888">3/14 semanas</text>

  <!-- Python logo hint -->
  <text x="760" y="185" font-family="Inter, sans-serif" font-size="10" fill="#555">🐍 Python 3.13+</text>
</svg>
